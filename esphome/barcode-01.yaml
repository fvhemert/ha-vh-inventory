    then:
      - lambda: |-
          id(timer_remaining) = id(idle_timer).state;
          id(timer_running) = true;
      - lvgl.label.update:                      # Show the remaining time top left
          id: lbl_idletimer      
          text: 
            !lambda |-
            return std::to_string((int)id(timer_remaining)) + "s";
      - lvgl.widget.show: lbl_idletimer         # Enable the widget that shows remaining time
      - logger.log:
          level: INFO
          format: "Timer is started (%ds)"
          args: [ 'id(timer_remaining)']
  # Restart the timer to switch to OFF mode when idle
  - id: timer_reset                             
    then:
      - lambda: |-
          id(timer_remaining) = id(idle_timer).state;
          id(timer_running) = true;
      - lvgl.widget.show: lbl_idletimer
      - logger.log:
          level: INFO
          format: "Timer is re-started (%ds)"
          args: [ 'id(timer_remaining)']
  # Stop the timer to switch to OFF mode when idle
  - id: timer_stop                             
    then:
      - lambda: |-
          id(timer_running) = false;
      - lvgl.widget.hide: lbl_idletimer
      - logger.log: 
          level: INFO
          format: "Timer is stopped"
#########################################################################################################################
# Barcode scanner GM67  
#########################################################################################################################
uart:  
  id: scanner                                  # Define the serial connection to the scanner
  rx_pin: "${uart_rx_pin_scan}"
  tx_pin: "${uart_tx_pin_scan}"
  baud_rate: 9600
  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: "\r"
    sequence:
        - if:                                  # If a supported 14, 13, 12 or 8 digit numeric barcode was scanned
            condition:
              lambda: |-
                std::string str(bytes.begin(), bytes.end()); 
                if ( 
                  (strlen(str.c_str()) == 14 and str.substr(0, 13).find_first_not_of("0123456789") == std::string::npos) or // is 13 digit EAN-13 barcode
                  (strlen(str.c_str()) == 13 and str.substr(0, 12).find_first_not_of("0123456789") == std::string::npos) or // is 12 digit UPC-A barcode
                  (strlen(str.c_str()) == 9 and str.substr(0, 8).find_first_not_of("0123456789") == std::string::npos) or   // is 8 digit EAN-8 or UPC-E barcode
                  (strlen(str.c_str()) == 15 and str.substr(0, 14).find_first_not_of("0123456789") == std::string::npos)    // is 14 digit ITF-14 barcode
                ) { 
                  return true; 
                } else {
                  return false;
                } 
            then:                              # Log the received barcode and update the last_barcode and last_scan entities
              - logger.log: 
                  level: INFO
                  format: "A PRODUCT BARCODE was scanned "
              - lambda: |-
                  UARTDebug::log_string(direction, bytes);
                  std::string str(bytes.begin(), bytes.end());
                  id(last_barcode).publish_state(str.c_str()); 
                  id(last_scan).trigger("barcode_scanned"); 
              - homeassistant.event:                       # Send a HA event with the scanned product barcode
                  # event: esphome.scanner_product
                  event: "${product_barcode_scanned}"
                  data_template: 
                    barcode: "{{ scanned_barcode }}"
                    device: "${name}"
                  variables:
                    scanned_barcode: !lambda |-
                        std::string str(bytes.begin(), bytes.end()); 
                        return str.c_str(); 
              - script.execute: timer_reset    # Reset the timer to switch to OFF mode, the timer is running when the scanner is ON
        - if:                                  # If a special QR code was scanned which contains text starting "GENERIC:"
            condition:
              lambda: |-
                std::string str(bytes.begin(), bytes.end());
                if (str.substr(0, 8) == "GENERIC:") { // starts with "GENERIC:"
                  return true; 
                } else {
                  return false;
                } 
            then:                              # Log the received barcode and update the last_barcode and last_scan entities
              - logger.log: 
                  level: INFO
                  format: "A SPECIAL QR CODE was scanned "
              - lambda: |-
                  UARTDebug::log_string(direction, bytes);
                  std::string str(bytes.begin(), bytes.end());
                  id(last_barcode).publish_state(str.substr(8).c_str()); // Get rid of the "GENERIC:" from the front
                  id(last_scan).trigger("barcode_scanned");
              - homeassistant.event:           # Send a HA event with the scanned product barcode
                  # event: esphome.scanner_generic
                  event: "${generic_barcode_scanned}"
                  data_template: 
                    product: "{{ scanned_product }}"
                    device: "${name}"
                  variables:
                    scanned_product: !lambda |-
                        std::string str(bytes.begin(), bytes.end()); 
                        return str.substr(8).c_str(); 
              - script.execute: timer_reset    # Reset the timer to switch to OFF mode, the timer is running when the scanner is ON
#########################################################################################################################
# Expose scanner module config to Home Assistant
#########################################################################################################################
select:
  - platform: template                         # Scanner configuration - scanning trigger mode of the GM67
    name: "Trigger Mode"
    id: scan_mode
    optimistic: true
    icon: mdi:auto-mode
    entity_category: CONFIG
    options:                                   
      - Button Holding
      - Button Trigger
      - Continuous Scanning
      - Automatic Induction
      - Host
    initial_option: Automatic Induction        # For the scanner typically the Automatic Induction is used. Moving an onject infront of the scanner starts scanning.
    restore_value: true                        # The scanner is enabled/disabled by picking an operation mode (ADD/USE/OFF)
    on_value:
      - if:
          condition:
            lambda: 'if (x == "Button Holding") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x00, 0xFE, 0x9D]
      - if:
          condition:
            lambda: 'if (x == "Button Trigger") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x02, 0xFE, 0x9B]
      - if:
          condition:
            lambda: 'if (x == "Continuous Scanning") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x04, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'if (x == "Automatic Induction") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x09, 0xFE, 0x94]
      - if:
          condition:
            lambda: 'if (x == "Host") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x08, 0xFE, 0x95]
  - platform: template                         # Scanner configuration - Set Buzzer Volume
    name: "Buzzer Volume"
    id: buzzer_volume
    optimistic: true
    icon: mdi:volume-high
    entity_category: CONFIG
    options:
      - 'Off'
      - Low
      - Medium
      - High
    initial_option: Medium
    restore_value: true
    on_value:
      - if:                                    # Set the buzzer Off
          condition:
            lambda: 'if (x == "Off") { return true; } else { return false; }'
          then:
            - uart.write: # Turn off
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x00, 0xFE, 0xEF]
      - if:                                    # Set the buzzer volume to Low
          condition:
            lambda: 'if (x == "Low") { return true; } else { return false; }'
          then:
            - uart.write:                      # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE] 
            - uart.write:                      # Set low
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x02, 0xFE, 0x99]
      - if:                                    # Set the buzzer volume to Medium
          condition:
            lambda: 'if (x == "Medium") { return true; } else { return false; }'
          then:
            - uart.write:                      # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xE]
            - uart.write:                      # Set medium
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x01, 0xFE, 0x9A]
      - if:                                    # Set the buzzer volume to High
          condition:
            lambda: 'if (x == "High") { return true; } else { return false; }'
          then:
            - uart.write:                      # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xE]
            - uart.write:                      # Set high
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x00, 0xFE, 0x9B]
  
  - platform: template                         # Scanner configuration - Configure Scanning Light behavior
    name: "Scanning Light"
    id: scanning_light
    optimistic: true
    icon: mdi:lightbulb-on
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading            # To improve visibility, the light is turned on when scanning
    restore_value: true
    on_value:
      - if:                                    # Scanning light ON When Reading
          condition:
            lambda: 'if (x == "On When Reading") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x00, 0xFE, 0x32]
      - if:                                     # Scanning light Always On
          condition:
            lambda: 'if (x == "Always On") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x01, 0xFE, 0x31]
      - if:                                     # Scanning light Always Off
          condition:
            lambda: 'if (x == "Always Off") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x02, 0xFE, 0x30]
  
  - platform: template                          # Scanner configuration - Configure Collimation behavior
    name: "Collimation"
    id: collimation
    optimistic: true
    icon: mdi:line-scan
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading             # Collimation is turned on when scanning to make positioning of the barcode easier
    restore_value: true
    on_value:
      - if:                                     # Collimation On When Reading
          condition:
            lambda: 'if (x == "On When Reading") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x00, 0xFE, 0x31]
      - if:                                     # Collimation Always On
          condition:
            lambda: 'if (x == "Always On") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x01, 0xFE, 0x30]
      - if:                                     # Collimation Always Off
          condition:
            lambda: 'if (x == "Always Off") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x02, 0xFE, 0x2F]
  
  - platform: template                          # Configure Same Code Delay
    name: "Same Code Delay"
    id: same_code_delay
    optimistic: true
    icon: mdi:repeat-variant
    entity_category: CONFIG
    options:
      - 0.5s
      - 1s
      - 3s
      - 5s
      - 7s 
      - No Repeat
    initial_option: 3s
    restore_value: true
    on_value:
      - if:                                     # Set to 0.5s
          condition:
            lambda: 'if (x == "0.5s") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF3, 0x03, 0x05, 0xFE, 0x2B]
      - if:                                     # Set to  1s
          condition:
            lambda: 'if (x == "1s") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x01, 0xFD, 0x6A]
      - if:                                     # Set to  3s
          condition:
            lambda: 'if (x == "3s") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x03, 0xFD, 0x68]
      - if:                                     # Set to  5s
          condition:
            lambda: 'if (x == "5s") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x05, 0xFD, 0x66]
      - if:                                     # Set to  7s
          condition:
            lambda: 'if (x == "7s") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x07, 0xFD, 0x64]
      - if:                                     # Set to  No Repeat
          condition:
            lambda: 'if (x == "No Repeat") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x09, 0xFD, 0x62]
  
  - platform: template                          # Determine the scanner mode
    name: "Scanner mode"
    id: scanner_mode
    optimistic: true
    icon: mdi:line-scan
    options:
      - "${txt_mode_add}"                       # Add a purchased product to inventory
      - "${txt_mode_use}"                       # Remove a product from the inventory
      - "${txt_mode_off}"                       # Scanner is off
      - "${txt_mode_print}"
      - "${txt_mode_config}"
