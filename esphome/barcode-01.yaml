#########################################################################################################################
# ---- Display test
#     0.5     Working version
#     0.5.1   Updated splashscreen with logo, fixed issues with dim while idle
#     0.5.2   Changed display colors to align with splash screen
#     0.5.3   New Home Assistant Event names, implemented generic barcodes / qr codes
#     0.5.4   Added Config page with sliders for brightness and idle timer settings
#     0.5.5   Changes to support new LVGL support for rotation
#     0.6.0   Updated and moved to production server
#     0.6.1   Added device identifier to HA events
#########################################################################################################################
substitutions:
  name: "barcode-01"
  friendly_name: "barcode-01"
  project_name: 'Boodschappen scanner'
  project_version: '0.6.1'
  # Ports for display
  dis_cs_pin: GPIO05        # Display board PIN 3
  dis_reset_pin: GPIO22     # Display board PIN 4
  dis_dc_pin: GPIO04        # Display board PIN 5
  dis_mosi_pin_spi: GPIO23  # Display board PIN 6
  dis_clk_pin_spi: GPIO18   # Display board PIN 7
  dis_pin_led: GPIO15       # Display board PIN 8
  dis_miso_pin_spi: GPIO19  # Display board PIN 9
  # Ports for Touch, to facilitate easy wiring not using a shared SPI         
  touch_clk_spi: GPIO21     # Display board PIN 10
  touch_cs: GPIO14          # Display board PIN 11
  touch_dn_mosi_spi: GPIO17 # Display board PIN 12
  touch_do_miso_spi: GPIO16 # Display board PIN 13
  touch_irq: GPIO27         # Display board PIN 14
  # UART-Pins  Barcode-Scanner
  uart_rx_pin_scan: GPIO03            # Black wire
  uart_tx_pin_scan: GPIO01            # Yellow wire
  # Logo to show at boot and when idle
  logo_file: '_images/van_hemert_inverted_lo.png'                        # Company logo shown at boot
  # Display text
  txt_barcode: 'Barcode'
  txt_stock: 'Voorraad'
  txt_product_name: 'Produkt naam'
  txt_product_description: 'Fabrikant'
  txt_mode_add: 'Toevoegen'
  txt_mode_use: 'Gebruiken'
  txt_mode_off: 'Off'
  txt_make_choice: "Maak een keuze"
  txt_action_scan_a_product: "Scan een barcode"
  txt_mode_print: 'Afdrukken'
  txt_mode_print_shoppinglist: 'Boodschappen'
  txt_mode_print_inventory: 'Voorraad'
  txt_mode_config: 'Config'  
  # Events triggered by scanning
  product_barcode_scanned: 'esphome.scanner_product'
  generic_barcode_scanned: 'esphome.scanner_generic'
  # Display rotation
  display_rotation: 270
#########################################################################################################################
# ---- MCU setup and config                                                                       
#########################################################################################################################
esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: false
  min_version: 2026.1.0
  project:
    name: display.vanhemert
    version: "${project_version}"
  on_boot:                                    # Show the splash screen with company logo
      - switch.turn_off: idle_mode            # Set the screen brightness to high
      - script.execute: timer_start           # Start the time to dim the splash screen when expires
# Definition for ESP32-WROOM-32D / HW-395-v0.0.3
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"            # Reduces the size of the BIN file, only for specific boards
      sram1_as_iram: true                     # Extra 40KB IRAM from bootloader support
# API Encryption key to connect to Home Assistant
api:
  encryption:
    key: !secret barcode_01_api_encryption_key
# When client connected show the connection icon in the to header 
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - logger.log: 
              level: INFO
              format: "Scanner connected to Home Assistant"
          - lvgl.widget.show: lbl_hastatus    # Show the 'connected' status icon when connected    
# When client disconnected remove the connection icon in the to header          
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - logger.log: 
              level: INFO
              format: "Scanner disconnected from Home Assistant"
          - lvgl.widget.hide: lbl_hastatus    # Remove the 'connected' status icon when disconnected              
# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: !secret barcode_01_ota_password
# WiFi settings from secrets file
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
# Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "barcode-01 Fallback Hotspot"
    password: !secret barcode_01_fallback_hotspot_password
# Enable web portal
captive_portal:  
# Enable logging  
logger:
  level: INFO
#########################################################################################################################
#  SENSORS
#########################################################################################################################
output:
  - platform: ledc                             # PWM output for display backlight
    pin: "${dis_pin_led}"              
    id: backlight_pwm
globals:
  - id: timer_remaining                        # Idle timer to switch back to the main page
    type: int
    restore_value: no
  - id: timer_running                          # Indicates if the idle timer is running
    type: bool
    restore_value: no
    initial_value: "false"
light:
  - platform: monochromatic                    # Display backlight, intensity can be controlled through PWM
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
button:  
  - platform: restart                          # Button to reset the board from Home Assistant
    name: "Restart"
    entity_category: CONFIG
text_sensor:
  - platform: template                         # Contains the last barcode that was scanned
    id: last_barcode               
    name: Barcode read
    icon: mdi:barcode
    on_value:
      then:
        - lvgl.label.update:                   # If the barcode is updated, also show on the display
            id: lbl_barcode_val
            text:
              format: "%s"
              args: [ 'id(last_barcode).state.c_str()' ]
number:
  - platform: template                         # Display brightness when the device is in IDLE mode
    name: "Display IDLE Brightness"
    id: brightness_idle
    min_value: 1
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    optimistic: true
    restore_value: true
    initial_value: 40
    entity_category: config
  - platform: template                         # Display brighness when the device is OPERATIONAL
    name: "Display ON Brightness"
    id: brightness_on
    min_value: 1
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    optimistic: true
    restore_value: true
    initial_value: 100
    entity_category: config
  - platform: template                         # IDLE Timer, time to return to home screen
    name: "Idle Timer"
    id: idle_timer
    min_value: 1
    max_value: 60
    step: 5
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    optimistic: true
    restore_value: true
    initial_value: 30
    entity_category: config
switch:   
  - platform: template
    name: "Print Shopping List"                # Switch to trigger the print action automation
    id: sw_print_shopping_list
    icon: mdi:printer
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:                                # When HA/ESPHome turns the switch ON -> show checked state on the LVGL button
      - lvgl.widget.update:
          id: btn_print_shopping_list
          state:
            checked: true
    on_turn_off:                               # When HA/ESPHome turns the switch OFF -> clear checked state on the LVGL button
      - lvgl.widget.update:
          id: btn_print_shopping_list
          state:
            checked: false
  - platform: template
    name: "Print Inventory List"               # Switch to trigger the print action automation
    id: sw_print_inventory_list
    icon: mdi:printer
    optimistic: true
    restore_mode: ALWAYS_OFF                  
    on_turn_on:                                # When HA/ESPHome turns the switch ON -> show checked state on the LVGL button
      - lvgl.widget.update:
          id: btn_print_inventory_overview
          state:
            checked: true
    on_turn_off:                               # When HA/ESPHome turns the switch OFF -> clear checked state on the LVGL button
      - lvgl.widget.update:
          id: btn_print_inventory_overview
          state:
            checked: false
  - platform: template
    name: "Idle Mode"                          # Boolean that indicates the mode the scanner is in IDLE or ON
    id: idle_mode
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: diagnostic   
    internal: true                            # Not exposed in Home Assistant
    on_turn_on:                                # If the mode is IDLE then screen brighness to low
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            return id(brightness_idle).state / 100.0;
    on_turn_off:                               # If the mode is ON then screen brighness to HIGH
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            return id(brightness_on).state / 100.0;
  - platform: template                         
    name: "Collimation Flashing"               # Scanner configuration - Collimation Flashing
    id: collimation_flashing
    optimistic: true
    icon: mdi:line-scan
    entity_category: CONFIG
    restore_mode : RESTORE_DEFAULT_ON 
    turn_on_action:
      - uart.write: 
          id: scanner
          data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xB8, 0x00, 0xFD, 0x7C]
    turn_off_action:
      - uart.write: 
          id: scanner
          data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xB8, 0x01, 0xFD, 0x7B]
  - platform: template 
    name: "Scanning Enabled"                   # Scanner configuration - Enable scanning
    id: scanning_enable
    optimistic: true
    icon: mdi:barcode-off
    entity_category: CONFIG
    #restore_mode : RESTORE_DEFAULT_ON 
    restore_mode : ALWAYS_OFF                  # Scanner should be OFF at boot
    turn_on_action:
      - uart.write: 
          id: scanner                          # Show the scanner icon from the top bar
          data: [0x04, 0xE9, 0x04, 0x00, 0xFF, 0x0F]
      - lvgl.widget.show: lbl_scanner_status
    turn_off_action:
      - uart.write: 
          id: scanner
          data: [0x04, 0xEA, 0x04, 0x00, 0xFF, 0x0E]
      - lvgl.widget.hide: lbl_scanner_status   # Remove the scanner icon from the top bar
text:
  - platform: template                         # Product name sent from Home Assistant after lookup of barcode
    name: "Product Name"
    id: product_name
    icon: mdi:label
    mode: text          
    min_length: 0
    max_length: 64
    initial_value: ""
    restore_value: false
    optimistic: true                           # Optional, keep HA and device in sync quickly
    on_value:
      then:
        - logger.log:
            level: INFO                        # Write a log entry if a product name is received
            format: "New Product Name received from HA: %s"
            args: [ 'x.c_str()' ]              
        - lvgl.label.update:                   # Update the label on the display page
            id: lbl_name_val
            text:
              format: "%s"
              args:  [ 'x.c_str()' ]           
  - platform: template                         # Product description sent from Home Assistant after lookup of barcode
    name: "Product Description"
    id: product_description
    icon: mdi:label
    mode: text          
    min_length: 0
    max_length: 64
    initial_value: ""
    restore_value: false
    optimistic: true                           # Optional, keep HA and device in sync quickly
    on_value:
      then:
        - logger.log:                          # Write a log entry if a product description is received
            level: INFO
            format: "New Product Description received from HA: %s"
            args: [ 'x.c_str()' ]              
        - lvgl.label.update:                   # Update the label on the display page
            id: lbl_description_val
            text:
              format: "%s"
              args:  [ 'x.c_str()' ]           
  - platform: template                         # Product dstock sent from Home Assistant after lookup of barcode
    name: "Stock"
    id: product_stock
    icon: mdi:label
    mode: text          
    min_length: 0
    max_length: 64
    initial_value: "-"
    restore_value: false
    optimistic: true                           # Optional, keep HA and device in sync quickly
    on_value:
      then:
        - logger.log:                          # Write a log entry if a product description is received
            level: INFO
            format: "New Product stock received from HA: %s"
            args: [ 'x.c_str()' ]              
        - lvgl.label.update:                   # Update the label on the display page
            id: lbl_stock_val
            text:
              format: "%s"
              args:  [ 'x.c_str()' ]           
#########################################################################################################################
# Home Assistant events
#########################################################################################################################
event:
  - platform: template                         # Provided for diagnostic purposes only. You should use the HA event "esphome.barcode_scan" triggered when a scan is performed
    name: "Last Scan"
    id: "last_scan"
    icon: mdi:barcode-scan
    entity_category: DIAGNOSTIC
    disabled_by_default: false
    event_types:
     - "barcode_scanned"
#########################################################################################################################
#  TIMERS
#########################################################################################################################
interval:
  - interval: 1s                                                # IDLE timer to switch back to the default page and dim the display brightness
    then:
      - if:
          condition:
            lambda: 'return id(timer_running);'
          then:
            - lambda: |-
                if (id(timer_remaining) > 0) id(timer_remaining)--;
                if (id(timer_remaining) == 0) id(timer_running) = false;
            - lvgl.label.update:                                # Update the label at the left top of the page with the remaining time 
                id: lbl_idletimer
                text: !lambda |-
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%d sec", id(timer_remaining));
                  return std::string(buf);            
            - if:
                condition:                                      # Expire when timer hits 0
                  lambda: 'return id(timer_remaining) == 0;'
                then: 
                  - if:                                         # Determine what to do, splash screen-> dim or detail screen -> return to choice
                      condition:
                        lambda: |-
                          return lv_obj_has_flag(id(boot_screen), LV_OBJ_FLAG_HIDDEN);
                      then:                                     # On timeout on any screen (except splash) go to SPLASH screen
                        - lvgl.widget.hide: lbl_idletimer       # Hide the timer indication at the top left of the page
                        - script.execute: show_splash_screen
                        - logger.log:
                            level: INFO
                            format: "Timer expired, go to SPLASH screen"
                      else:                                     # On timeout on splash screen, dim brightness
                        - switch.turn_on: idle_mode
                        - logger.log:
                            level: INFO
                            format: "Timer expired, dimming the screen"                      
#########################################################################################################################
#  GRAPHIC DISPLAY DEFINITION
#########################################################################################################################
font:                                                           # Fonts located in the /homeassistant/esphome/_fonts folder
  - file: "_fonts/arial.ttf"
    id: arial_font_14
    size: 14
    glyphs:  >-
      'ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
  - file: "_fonts/arial.ttf"
    id: arial_font_20
    size: 20
    glyphs:  >-
      'ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
  - file: "_fonts/arial.ttf"
    id: arial_font_24
    size: 24
    glyphs:  >-
      'ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
# Material Design Icons  https://fonts.google.com/icons?selected=Material+Symbols+Outlined:search:FILL@0;wght@400;GRAD@0;opsz@24&icon.size=24&icon.color=%235f6368
  - file: "gfonts://Material+Symbols+Outlined"
    id: icons_22
    size: 22
    glyphs: [
      "\U0000e70b", # mdi:barcode
      "\U0000e70c", # mdi:barcode-scanner
      "\U0000f85c", # mdi:barcode-reader
      "\U0000e63e", # mdi:wifi
      "\U0000e8b6", # mdi:search
      "\U0000e8ac"  # mdi:power
      ] 
image:
  - file: "${logo_file}"                                        # Company logo for the SPLASH screen 
    id: logo_image
    resize: 280x200
    type: RGB565
    transparency: alpha_channel
color:           
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_grey
    hex: "A9A9A9"
# Definition of the user interface
lvgl:
  rotation: "${display_rotation}"
  style_definitions:
    # Base tile look — steel blue with gold accents matching monogram ---
    - id: style_base
      bg_opa: COVER
      bg_color: 0x4A5A6A          # Steel blue from monogram
      bg_grad_color: 0x3A4A5A     # Darker steel blue gradient
      bg_grad_dir: VER
      radius: 10
      clip_corner: true
      border_width: 2
      border_opa: 70%
      border_color: 0xDBA85A      # Gold border on blue buttons
      shadow_color: 0xDBA85A      # Gold glow
      shadow_opa: 20%
      shadow_width: 20
      shadow_spread: 2
      shadow_offset_y: 8
      shadow_offset_x: 0
      pad_left: 14
      pad_right: 14
      pad_top: 12
      pad_bottom: 14
      text_font: arial_font_20
      text_color: 0xDBA85A        # Gold text on blue buttons
    # Style definition top layer
    - id: style_top_layer         # Top bar — gold-filled
      bg_color: 0xDBA85A          # Yellow/gold fill
      bg_grad_color: 0xC89848     # Slightly deeper gold gradient
      radius: 10
      text_font: arial_font_20
      border_width: 0             # Clean gold bar, no border needed
    # Style definition Button borders
    - id: style_details_border    # Details page sections — gold accent
      bg_color: 0x0D0D0D
      bg_opa: COVER
      border_width: 2
      border_opa: 60%
      border_color: 0xDBA85A      # Gold border
      radius: 10
      shadow_color: 0xDBA85A      # Gold glow
      shadow_opa: 15%
      shadow_width: 12
      shadow_spread: 1
      shadow_offset_y: 4
      shadow_offset_x: 0
    # Style definition Text labels
    - id: style_details_text      # Labels — silver
      bg_opa: TRANSP
      text_color: 0xB0B0B4
      text_font: montserrat_14
    # Style definition Value labels
    - id: style_details_val       # Values — yellow/gold
      bg_opa: TRANSP
      text_font: arial_font_20
      text_color: 0xDBA85A
  top_layer:
    widgets:
      - obj:                      # Top bar for the display
          id: top_bar
          styles:
              - style_base
              - style_top_layer
          align: TOP_MID
          width: 100%
          height: 38
          on_click:
            then:
              - script.execute: show_mode_selection
      - label:                    # Icon — API connection status
          text: "\uF1EB"
          id: lbl_hastatus
          hidden: true
          align: top_right
          x: -7
          y: 10
          text_align: right
          text_color: 0x0D0D0D    # Dark on gold bar
      - label:                    # Icon — scanner status
          text: "\U0000f85c"
          text_font: icons_22
          id: lbl_scanner_status
          hidden: true
          align: top_right
          x: -35
          y: 5
          text_align: right
          text_color: 0x0D0D0D    # Dark on gold bar
      - label:                    # Idle timer remaining time
          text: "nn"
          id: lbl_idletimer
          hidden: true
          align: top_left
          x: 10
          y: 10
          text_align: left
          text_color: 0x0D0D0D    # Dark on gold bar
      - label:                    # Top bar title
          text: "van Hemert"
          id: lbl_top_text
          hidden: false
          align: TOP_MID
          x: 10
          y: 4
          width: 300
          height: 26
          text_align: CENTER
          text_color: 0x0D0D0D      # Dark on gold bar
          text_font: arial_font_24
      - obj:                        # Splash screen with company logo
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0x000000
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: logo_image
                y: -20
            - label:                    # Project name and version on splash
                text: "${name} - v${project_version}"
                id: splash_text
                hidden: false
                x: 10
                y: 200
                width: 300
                height: 26
                text_align: CENTER
                text_color: 0xB0B0B4    # Silver version text
                text_font: arial_font_20   
          on_press:                     # Touching the screen will switch based on HA startup mode setting
            - if:
                condition:
                  lambda: 'return id(startup_mode).current_option() == "${txt_mode_add}";'
                then:
                  - script.execute: show_add_product
                else:
                  - if:
                      condition:
                        lambda: 'return id(startup_mode).current_option() == "${txt_mode_use}";'
                      then:
                        - script.execute: show_use_product
                      else:
                        - script.execute: show_mode_selection
  pages:
    - id: page_mode_selection           # Mode selection — ADD / USE / PRINT
      bg_color: 0x0D0D0D
      widgets:
        - button:                       # Button to switch to the ADD page
            id: btn_mode_add          
            styles:
              - style_base
            x: 0
            y: 70
            width: 155
            height: 70
            checkable: false
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap
                  text: "${txt_mode_add}"
            on_click:
              then:
                - script.execute: show_add_product
        - button:                       # Button to switch to the USE page
            id: btn_mode_use
            styles:
              - style_base
            x: 165
            y: 70
            width: 155
            height: 70
            checkable: false
            pressed:
              bg_color: 0x5A6A7A        # Lighter steel blue on press
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap                  
                  text: "${txt_mode_use}"
            on_click:
              then:
                - script.execute: show_use_product
        - button:                       # Button to switch to the PRINT page
            id: btn_mode_print
            styles:
              - style_base
            x: 0
            y: 150
            width: 155
            height: 70
            checkable: false
            pressed:
              bg_color: 0x5A6A7A        # Lighter steel blue on press
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap
                  text: "${txt_mode_print}"
            on_click:
              then:
                - script.execute: show_page_printing
        - button:                       # Button to switch to the CONFIG page
            id: btn_mode_config
            styles:
              - style_base
            x: 165
            y: 150
            width: 155
            height: 70
            checkable: false
            pressed:
              bg_color: 0x5A6A7A        # Lighter steel blue on press
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap
                  text: "${txt_mode_config}"
            on_click:
              then:
                - script.execute: show_page_config
    - id: page_printing                 # Print selection — shopping list / inventory
      bg_color: 0x0D0D0D
      widgets:
        - button:
            id: btn_print_shopping_list
            styles:
              - style_base
            x: 0
            y: 70
            width: 155
            height: 70
            checkable: true
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap
                  text: "${txt_mode_print_shoppinglist}"
            on_click:                   # When the button is clicked, the Home Assistant device is set to on.
              then:                     # This will trigger an automation that will start printing
                - if:                   # When done printing the Home Assistant device is turned off
                    condition:
                      lambda: |-
                        return lv_obj_has_state(id(btn_print_shopping_list), LV_STATE_CHECKED);
                    then:
                      - switch.turn_on: sw_print_shopping_list
                    else:
                      - switch.turn_off: sw_print_shopping_list
        - button:
            id: btn_print_inventory_overview
            styles:
              - style_base
            x: 165
            y: 70
            width: 155
            height: 70
            checkable: true
            pressed:
              bg_color: 0x5A6A7A        # Lighter steel blue on press
            widgets:
              - label:
                  align: CENTER
                  long_mode: wrap                  
                  text: "${txt_mode_print_inventory}"
            on_click:                   # When the button is clicked, the Home Assistant device is set to on.
              then:                     # This will trigger an automation that will start printing
                - if:                   # When done printing the Home Assistant device is turned off
                    condition:
                      lambda: |-
