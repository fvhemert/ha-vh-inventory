  # Switch to the printing page, update the labels and control the timer
  - id: show_page_printing
    mode: queued
    max_runs: 1
    then:
      - lvgl.label.update:                      # Show printing in top bar
          id: lbl_top_text
          text:   "${txt_mode_print}"                  
      - switch.turn_off: scanning_enable        # Turn the scanner OFF
      - select.set:
          id: scanner_mode
          option: "${txt_mode_print}"
      - lvgl.widget.hide: boot_screen
      - switch.turn_off: idle_mode
      - lvgl.page.show: page_printing
      - script.execute: timer_start             # Stop the timer to automatically switch off the scanner
  # Switch to the config page, update the labels and control the timer
  - id: show_page_config
    mode: queued
    max_runs: 1
    then:
      - lvgl.label.update:                      # Show config in top bar
          id: lbl_top_text
          text: "${txt_mode_config}"
      - switch.turn_off: scanning_enable        # Turn the scanner OFF
      - select.set:
          id: scanner_mode
          option: "${txt_mode_config}"
      - lvgl.widget.hide: boot_screen
