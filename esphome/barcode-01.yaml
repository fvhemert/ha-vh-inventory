########################################################################################################################
#  TOUCH DISPLAY DEFINITION
#########################################################################################################################
spi:
  - id: spi_display
    clk_pin: "${dis_clk_pin_spi}"       # Display board PIN 7
    mosi_pin: "${dis_mosi_pin_spi}"     # Display board PIN 6
    miso_pin: "${dis_miso_pin_spi}"     # Display board PIN 9
    interface: any 
  - id: spi_touch
    clk_pin: "${touch_clk_spi}"         # Display board PIN 10  
    mosi_pin: "${touch_dn_mosi_spi}"    # Display board PIN 12
    miso_pin: "${touch_do_miso_spi}"    # Display board PIN 13
display:
  - platform: mipi_spi
    id: my_display
    model: ILI9341
    
    spi_id: spi_display
    cs_pin: "${dis_cs_pin}"             # Display board PIN 3
    dc_pin: "${dis_dc_pin}"             # Display board PIN 5
    reset_pin: "${dis_reset_pin}"       # Display board PIN 4
    
    auto_clear_enabled: false           # Needs to be false if using LVGL
    update_interval: 0.5s    
    invert_colors: false
    buffer_size: 50%
    dimensions:    
      width: 240
      height: 320
      offset_width: 0
      offset_height: 0
touchscreen:
  platform: xpt2046
  display: my_display
  id: my_touchscreen
  spi_id: spi_touch
  cs_pin: "${touch_cs}"                 # Display board PIN 11
  interrupt_pin: "${touch_irq}"         # Display board PIN 14
  update_interval: 50ms                 # The interval to check the sensor, should not be relevant, using IRQ
  threshold: 400                        # The value to detect the touch or release. Defaults to 400.
  calibration:
    x_min: 321                          # values from screen calibration
    x_max: 3941
    y_min: 193
    y_max: 3921
  transform:                            # do not use swap_xy: true this will disable automated touch rotation introduced in LVGL 9.x
    mirror_x: true
