#########################################################################################################################
# ---- Small screen barcode scanner with printer (scanner-01)
#########################################################################################################################
# CHANGELOG
#     1.00    ESP8266 + GM67 scanner + thermal printer + SSD1306 OLED, two hardware buttons/LEDs
#     1.05    Working version imported from production server
#     1.06    Sanitised API encryption key to !secret (repo is public)
#     1.07    Aligned code structure, entity names and HA events to barcode-01 / barcode-02:
#               - Reformatted with the wide '####' section banners and section order used by barcode-01/02
#                 (MCU setup -> SENSORS -> HA events -> TIMERS -> GRAPHIC DISPLAY DEFINITION -> SCRIPTS ->
#                  Barcode scanner GM67 -> Thermal printer -> Expose scanner config)
#               - Product-scan HA event renamed  esphome.scanner01_scan    -> esphome.scanner_product
#                 (via ${product_barcode_scanned}) and added  device: "${name}"  to the event data
#               - Generic-scan HA event renamed  esphome.scanner01_generic -> esphome.scanner_generic
#                 (via ${generic_barcode_scanned}) and added  device: "${name}"  to the event data
#               - 'last_barcode' friendly name    "Last Barcode" -> "Barcode read"
#               - Project version moved from hardcoded "1.05" to the ${project_version} substitution
#               - Trimmed trailing spaces in the "Right LED"/"Left LED" names; print API action service: -> action:
#             GM67 hex command payloads, GPIO pin assignments and the OLED display lambda are UNCHANGED.
#     1.08    Added Add/Use scanner mode (scanner_mode select) toggled by the RIGHT hardware button,
#               mirroring barcode-01/02 so HA maps Toevoegen->Add / Gebruiken->Use via
#               select.scanner_01_scanner_mode. Left LED = Add, right LED = Use, both off = Off.
#               NOTE: requires 'scanner-01' added to the vh_inventory_barcode_scanned HA automation.
#########################################################################################################################
# NOTE: This device differs from barcode-01 / barcode-02 in that it has a small monochrome OLED (no touchscreen),
#       two hardware buttons with LEDs, and a built-in thermal printer. Add/Use mode and the LVGL page system used
#       by barcode-01/02 are intentionally NOT implemented here (functionality that does not yet exist is left out).
#########################################################################################################################
substitutions:
  name: "scanner-01"
  friendly_name: "SCANNER-01"
  project_name: 'Boodschappen scanner'
  project_version: '1.08'
  # Scanner mode labels (must match barcode-01/02 so HA maps them to Add/Use)
  txt_mode_add: 'Toevoegen'
  txt_mode_use: 'Gebruiken'
  txt_mode_off: 'Off'
  # I2C-Pins Display
  display_i2c_sda: GPIO04
  display_i2c_scl: GPIO05
  # I2C-Address OLED Display
  ssd1306_i2c_address: "0x3C"
  # UART-Pins  Barcode-Scanner
  uart_rx_pin_scan: GPIO03            # Black wire
  uart_tx_pin_scan: GPIO01            # Yellow wire
  # UART-Pins  Printer
  uart_rx_pin_print: GPIO14           # Green wire
  uart_tx_pin_print: GPIO12           # Yellow wire
  # Pins Switches and leds
  led_left_pin: GPIO13
  led_right_pin: GPIO15
  button_left_pin: GPIO00
  button_right_pin: GPIO02
  # Events triggered by scanning
  product_barcode_scanned: 'esphome.scanner_product'
  generic_barcode_scanned: 'esphome.scanner_generic'
#########################################################################################################################
# ---- MCU setup and config
#########################################################################################################################
esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: false
  min_version: 2024.11.0
  project:
    name: vanhemert.scanner01
    version: "${project_version}"
  on_boot:                                     # On boot set the status to connecting
    - text_sensor.template.publish:
        id: screen_mode
        state: "connecting"
# Definition for ESP8266 (esp01_1m)
esp8266:
  board: esp01_1m
# API Encryption key to connect to Home Assistant
api:
  encryption:
      key: !secret scanner_01_api_encryption_key
  actions:
    # Published action to support printing - writes the given string to the thermal printer over UART
    - action: write
      variables:
        command: string
      then:
        - uart.write:                          # https://community.home-assistant.io/t/uart-send-text-from-helper/396803/7
            id: printer
            data: !lambda |-
              std::string str = command;
              std::vector<uint8_t> vec(str.begin(), str.end());
              return vec;
    # For now, when a product is identified it just logs it and shows it on the OLED (can be extended later)
    - action: product_identified
      variables:
        product: string
      then:
        - text_sensor.template.publish:        # Set the mode to result
            id: screen_mode
            state: "result"
        - text_sensor.template.publish:        # Set the last result to the returned value
            id: last_result
            state: !lambda 'return product.c_str();'
        - script.execute: standby_timer        # Start the timer to return to standby
        - logger.log:
            level: INFO
            format: "Returned Product: %s"
            args: [ 'product.c_str()' ]
        - lambda: |
            id(product_title) = product.c_str();
# When client connected set the status to standby
  on_client_connected:
    - text_sensor.template.publish:
        id: screen_mode
        state: "standby"
    - script.stop: standby_timer               # Stop the timer in case its running
# When client disconnected set the status back to connecting
  on_client_disconnected:
    - text_sensor.template.publish:
        id: screen_mode
        state: "connecting"
    - script.stop: standby_timer               # Stop the timer in case its running
# Allow Over-The-Air updates
ota:
  - platform: esphome
# WiFi settings from secrets file
wifi:
  ssid: !secret wifi_ssid2
  password: !secret wifi_password2
  min_auth_mode: WPA2
  #use_address: 192.168.1.65
# Enable web portal
captive_portal:
# Enable logging (baud_rate 0 disables serial logging so the UART pins stay free)
logger:
  baud_rate: 0
#########################################################################################################################
#  SENSORS
#########################################################################################################################
# Buttons with built in LEDs - GPIO outputs driving the two indicator LEDs
output:
  - id: led_right                              # Right indicator LED
    platform: gpio
    pin: "${led_right_pin}"
    inverted: false
  - id: led_left                               # Left indicator LED
    platform: gpio
    pin: "${led_left_pin}"
    inverted: false
light:
  - platform: binary                           # Expose the right LED to Home Assistant
    name: "Right LED"
    id: led_right_light
    output: led_right
  - platform: binary                           # Expose the left LED to Home Assistant
    name: "Left LED"
    id: led_left_light
    output: led_left
binary_sensor:
  - platform: gpio                             # Right hardware button - short press toggles Add <-> Use mode
    name: "Right button"
    pin:
      number: "${button_right_pin}"
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - if:                                  # If currently in Add mode switch to Use, otherwise (Use/Off) switch to Add
            condition:
              lambda: 'return id(scanner_mode).state == "${txt_mode_add}";'
            then:
              - select.set:
                  id: scanner_mode
                  option: "${txt_mode_use}"
            else:
              - select.set:
                  id: scanner_mode
                  option: "${txt_mode_add}"
  - platform: gpio                             # Left hardware button
    name: "Left button"
    pin:
      number: "${button_left_pin}"
      inverted: true
      mode:
        input: true
        pullup: true
button:
  - platform: restart                          # Button to reset the board from Home Assistant
    name: "Restart"
    entity_category: CONFIG
text_sensor:
  - platform: template                         # Current status of the device, drives what is shown on the OLED. Not exposed to HA
    id: screen_mode
    name: Screen Mode
    internal: true
  - platform: template                         # Contains the last barcode that was scanned
    id: last_barcode
    name: Barcode read
    icon: mdi:barcode
    entity_category: DIAGNOSTIC
    disabled_by_default: true
  - platform: template                         # Contains the last product passed back from HA, shown on the OLED. Not exposed to HA
    id: last_result
    name: Last Result
    internal: true
#########################################################################################################################
# Home Assistant events
#########################################################################################################################
event:
  - platform: template                         # Provided for diagnostic purposes only. You should use the HA event "esphome.scanner_product" triggered when a scan is performed
    name: "Last Scan"
    id: "last_scan"
    icon: mdi:barcode-scan
    entity_category: DIAGNOSTIC
    disabled_by_default: false
    event_types:
      - "barcode_scanned"
#########################################################################################################################
#  TIMERS
#########################################################################################################################
# Advance the scrolling text shown on the OLED
interval:
  - interval: 30ms                             # Code suggestion from https://community.home-assistant.io/t/scrolling-text-on-ssd1306-oled-screen/305433/11
    then:
      - lambda: |-
          if (id(scroll_x) < -(id(scroll_length))) {
            // Start at right side of clipping area
            id(scroll_x) = 127;
          }
          else  {
            id(scroll_x) -= 2;
          }
#########################################################################################################################
#  GRAPHIC DISPLAY DEFINITION
#########################################################################################################################
# I2C bus for OLED display
i2c:
  sda: "${display_i2c_sda}"
  scl: "${display_i2c_scl}"
  scan: false
  frequency: 400kHz
  id: i2c_bus
# Fonts located in the /homeassistant/esphome/_fonts folder
font:
  - file: "_fonts/arial.ttf"
    id: arial_font_18
    size: 18
    glyphs:  >-
      ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
  - file: "_fonts/arial.ttf"
    id: arial_font_24
    size: 24
    glyphs:  >-
      ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
  - file: "_fonts/arial.ttf"
    id: arial_font
    size: 30
    glyphs:  >-
      ß!?"%()+*=,-_.:°ø0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÄÜÖ abcdefghijklmnopqrstuvwxyzäüöïéè€@<>/
# Material Design Icons  https://fonts.google.com/icons?selected=Material+Symbols+Outlined:search:FILL@0;wght@400;GRAD@0;opsz@24&icon.size=24&icon.color=%235f6368
  - file: "gfonts://Material+Symbols+Outlined"
    id: icons_32
    size: 32
    glyphs: [
      "\U0000e70b", # mdi:barcode
      "\U0000e70c", # mdi:barcode-scanner
      "\U0000f85c", # mdi:barcode-reader
      "\U0000e63e", # mdi:wifi
      "\U0000e8b6", # mdi:search
      "\U0000e8ac"  # mdi:power
      ]
# Globals used to drive the scrolling text on the OLED
globals:
   - id: scroll_x
     type: int
     restore_value: no
     initial_value: '0'
   - id: scroll_length
     type: int
     restore_value: no
     initial_value: '0'
   - id: product_title
     type: std::string
     restore_value: no
     max_restore_data_length: 24
     initial_value: '"Klaar om te scannen"'
# OLED DISPLAY - renders the current screen_mode
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: "${ssd1306_i2c_address}"
    update_interval: 75ms                      # Was 100
    rotation: 0
    lambda: |-
      if(id(screen_mode).state == "connecting") {
        it.print(0, 0, id(icons_32), "\U0000e63e");
        std::string printout="Connecting to Home Assistant";
        int clength = printout.length();
        id(scroll_length) = clength * 15;
        // multiplication factor (in this case 10) to be determined with trial and error based on your font width
        it.print(id(scroll_x), 30, id(arial_font_24), printout.c_str());
      }
      else if(id(screen_mode).state == "standby") {
        it.print(0, 0, id(icons_32), "\U0000f85c");
        it.print(40, 5, id(arial_font_24), id(scanner_mode).state.c_str());

        std::string printout="Scan een product";
        int clength = printout.length();
        id(scroll_length) = clength * 15;
        // multiplication factor (in this case 10) to be determined with trial and error based on your font width
        it.print(id(scroll_x), 30, id(arial_font_24), printout.c_str());
      }
      else if(id(screen_mode).state == "scanned") {
        it.print(0, 0, id(icons_32), "\U0000e8b6");
        it.print(0, 30, id( arial_font_24), "Zoeken");
      }
      else if(id(screen_mode).state == "scanoff") {
        it.print(0, 0, id(icons_32), "\U0000e8ac");
        it.print(40, 6, id( arial_font_24), "Uit");

      std::string printout="van Hemert - Home Automation";
        int clength = printout.length();
        id(scroll_length) = clength * 15;
        // multiplication factor (in this case 10) to be determined with trial and error based on your font width
        it.print(id(scroll_x), 30, id(arial_font_24), printout.c_str());
      }
      else if(id(screen_mode).state == "result") {
        std::string printout=id(last_result).state.c_str();
        int clength = printout.length();
        id(scroll_length) = clength * 15;
        it.print(id(scroll_x), 5, id(arial_font_18), id(last_barcode).state.c_str());
        // multiplication factor (in this case 10) to be determined with trial and error based on your font width
        it.print(id(scroll_x), 30, id(arial_font_24), printout.c_str());
      }
       else {
        it.print(0, 4, id(arial_font_18), "Unknown Error");
      }
#########################################################################################################################
#  SCRIPTS
#########################################################################################################################
script:
  # 30 second timer used to reset the screen back to standby
  - id: standby_timer
    mode: restart
    then:
      - delay: 30s
      - text_sensor.template.publish:
          id: screen_mode
          state: "standby"
#########################################################################################################################
# Barcode scanner GM67
#########################################################################################################################
uart:
  # UART for the GM67 barcode scanner
  - id: scanner
    rx_pin: "${uart_rx_pin_scan}"
    tx_pin: "${uart_tx_pin_scan}"
    baud_rate: 9600
    debug:
      direction: RX
      dummy_receiver: true
      after:
        delimiter: "\r"
      sequence:
        - if:                                  # If a supported 14, 13, 12 or 8 digit numeric barcode was scanned
            condition:
              lambda: |-
                std::string str(bytes.begin(), bytes.end()); 
                if ( 
                  (strlen(str.c_str()) == 14 and str.substr(0, 13).find_first_not_of("0123456789") == std::string::npos) or // is 13 digit EAN-13 barcode
                  (strlen(str.c_str()) == 13 and str.substr(0, 12).find_first_not_of("0123456789") == std::string::npos) or // is 12 digit UPC-A barcode
                  (strlen(str.c_str()) == 9 and str.substr(0, 8).find_first_not_of("0123456789") == std::string::npos) or   // is 8 digit EAN-8 or UPC-E barcode
                  (strlen(str.c_str()) == 15 and str.substr(0, 14).find_first_not_of("0123456789") == std::string::npos)    // is 14 digit ITF-14 barcode
                ) { 
                  return true; 
                } else {
                  return false;
                } 
            then:                              # Log the received barcode and update the last_barcode and last_scan entities
              - lambda: |-
                  UARTDebug::log_string(direction, bytes);
                  std::string str(bytes.begin(), bytes.end());
                  id(last_barcode).publish_state(str.c_str()); 
                  id(last_scan).trigger("barcode_scanned"); 
                  id(screen_mode).publish_state("scanned");
              - homeassistant.event:                       # Send a HA event with the scanned product barcode
                  # event: esphome.scanner_product
                  event: "${product_barcode_scanned}"
                  data_template: 
                    barcode: "{{ scanned_barcode }}"
                    device: "${name}"
                  variables:
                    scanned_barcode: !lambda |-
                        std::string str(bytes.begin(), bytes.end()); 
                        return str.c_str(); 
              - text_sensor.template.publish:  # Set the status to scanned
                  id: screen_mode
                  state: "scanned"
              - script.execute: standby_timer  # Start the timer to return to standby just in case nothing comes back from HA
        - if:                                  # If a special QR code was scanned which contains text starting "GENERIC:"
            condition:
              lambda: |-
                std::string str(bytes.begin(), bytes.end());
                if (str.substr(0, 8) == "GENERIC:") { // starts with "GENERIC:"
                  return true; 
                } else {
                  return false;
                } 
            then:                              # Log the received barcode and update the last_barcode and last_scan entities
              - lambda: |-
                  UARTDebug::log_string(direction, bytes);
                  std::string str(bytes.begin(), bytes.end());
                  id(last_barcode).publish_state(str.substr(8).c_str()); // Get rid of the "GENERIC:" from the front
                  id(last_scan).trigger("barcode_scanned");
                  id(screen_mode).publish_state("scanned"); 
              - homeassistant.event:           # Send a HA event with the scanned product barcode
                  # event: esphome.scanner_generic
                  event: "${generic_barcode_scanned}"
                  data_template: 
                    product: "{{ scanned_product }}"
                    device: "${name}"
                  variables:
                    scanned_product: !lambda |-
                        std::string str(bytes.begin(), bytes.end()); 
                        return str.substr(8).c_str(); 
              - text_sensor.template.publish:  # Set the status to scanned
                  id: screen_mode
                  state: "scanned"
              - script.execute: standby_timer  # Start the timer to return to standby just in case nothing comes back from HA
#########################################################################################################################
# Thermal printer
#########################################################################################################################
# Second UART used to drive the built-in thermal printer. Write to it via the "write" API action defined above.
  - id: printer
    rx_pin: "${uart_rx_pin_print}"
    tx_pin: "${uart_tx_pin_print}"
    baud_rate: 9600
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes);
#########################################################################################################################
# Expose scanner module config to Home Assistant
#########################################################################################################################
select:
  # Add/Use scanner mode - mirrors barcode-01/02. HA reads select.scanner_01_scanner_mode
  # (Toevoegen -> Add, Gebruiken -> Use). Toggled with the right hardware button.
  - platform: template
    name: "Scanner mode"
    id: scanner_mode
    optimistic: true
    icon: mdi:swap-horizontal
    options:
      - "${txt_mode_add}"                      # Add a purchased product to inventory
      - "${txt_mode_use}"                      # Remove a product from the inventory
      - "${txt_mode_off}"                      # Scanner is off
    initial_option: "${txt_mode_off}"
    restore_value: true
    on_value:
      - if:                                    # Add mode: scanner ON, left LED on
          condition:
            lambda: 'return x == "${txt_mode_add}";'
          then:
            - switch.turn_on: scanning_enable
            - light.turn_on: led_left_light
            - light.turn_off: led_right_light
      - if:                                    # Use mode: scanner ON, right LED on
          condition:
            lambda: 'return x == "${txt_mode_use}";'
          then:
            - switch.turn_on: scanning_enable
            - light.turn_off: led_left_light
            - light.turn_on: led_right_light
      - if:                                    # Off mode: scanner OFF, both LEDs off
          condition:
            lambda: 'return x == "${txt_mode_off}";'
          then:
            - switch.turn_off: scanning_enable
            - light.turn_off: led_left_light
            - light.turn_off: led_right_light
  # The scanning trigger mode of the GM67
  - platform: template
    name: "Trigger Mode"
    id: scan_mode
    optimistic: true
    icon: mdi:auto-mode
    entity_category: CONFIG
    options:
      - Button Holding
      - Button Trigger
      - Continuous Scanning
      - Automatic Induction
      - Host
    initial_option: Automatic Induction
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'if (x == "Button Holding") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x00, 0xFE, 0x9D]
      - if:
          condition:
            lambda: 'if (x == "Button Trigger") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x02, 0xFE, 0x9B]
      - if:
          condition:
            lambda: 'if (x == "Continuous Scanning") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x04, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'if (x == "Automatic Induction") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x09, 0xFE, 0x94]
      - if:
          condition:
            lambda: 'if (x == "Host") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x08, 0xFE, 0x95]
  # Buzzer Volume
  - platform: template
    name: "Buzzer Volume"
    id: buzzer_volume
    optimistic: true
    icon: mdi:volume-high
    entity_category: CONFIG
    options:
      - 'Off'
      - Low
      - Medium
      - High
    initial_option: Medium
    restore_value: true
    on_value:
      - if: # Off
          condition:
            lambda: 'if (x == "Off") { return true; } else { return false; }'
          then:
            - uart.write: # Turn off
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x00, 0xFE, 0xEF]
      - if: # Low
          condition:
            lambda: 'if (x == "Low") { return true; } else { return false; }'
          then:
            - uart.write: # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE] 
            - uart.write: # Set low
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x02, 0xFE, 0x99]
      - if: # Medium
          condition:
            lambda: 'if (x == "Medium") { return true; } else { return false; }'
          then:
            - uart.write: # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xE]
            - uart.write: # Set medium
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x01, 0xFE, 0x9A]
      - if: # High
          condition:
            lambda: 'if (x == "High") { return true; } else { return false; }'
          then:
            - uart.write: # Turn on
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xE]
            - uart.write: # Set high
                id: scanner
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x00, 0xFE, 0x9B]
  # Scanning Light
  - platform: template
    name: "Scanning Light"
    id: scanning_light
    optimistic: true
    icon: mdi:lightbulb-on
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading
    restore_value: true
    on_value:
      - if: # On When Reading
          condition:
            lambda: 'if (x == "On When Reading") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x00, 0xFE, 0x32]
      - if: # Always On
          condition:
            lambda: 'if (x == "Always On") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x01, 0xFE, 0x31]
      - if: # Always Off
          condition:
            lambda: 'if (x == "Always Off") { return true; } else { return false; }'
          then:
            - uart.write: 
                id: scanner
