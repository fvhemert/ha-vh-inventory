    icon: mdi:translate
    options:
      - English
      - Nederlands
  vh_product_category:
    name: VH Product Category
    options: ["(none)"]
  vh_product_store:
    name: VH Product Store
    options: ["(none)"]
  vh_stock_product:
    name: VH Stock Product
    options: ["(none)"]
  vh_stock_location:
    name: VH Stock Location
    options: ["(none)"]
  vh_shopping_product:
    name: VH Shopping Product
    options: ["(none)"]
  vh_print_category:
    name: VH Print Category
    icon: mdi:shape
    options: ["All"]
    initial: All
  # Handheld scanner mode-button colours (Setup tab). NO `initial:` so the user's
  # choice persists across restarts (restore_state). On a fresh install each falls
  # back to its FIRST option, which is why the two share the same palette but with
  # a different leading colour: Add -> Cyan, Use -> Red (the historic defaults).
  vh_handheld_add_color:
    name: VH Handheld Add Color
    icon: mdi:palette
    options: ["Cyan", "Red", "Green", "Amber", "Blue", "Purple", "Orange", "Pink", "Teal", "Grey"]
  vh_handheld_use_color:
    name: VH Handheld Use Color
    icon: mdi:palette
    options: ["Red", "Cyan", "Green", "Amber", "Blue", "Purple", "Orange", "Pink", "Teal", "Grey"]

