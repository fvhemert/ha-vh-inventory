  vh_print_shopping:
    alias: VH Print Shopping List
    description: >-
      Print the VH-Inventory shopping list to the Epson TM-T20II (ESC/POS)
      thermal printer, grouped per store (bold store header + its items). Items
      whose product has no store or store "All" go under a final "Algemeen"
      section. Reads sensor.vh_inventory_shopping and sensor.vh_inventory_products.
    sequence:
      - service: escpos_printer.print_text
        data:
          text: "\nBoodschappenlijst"
          align: center
          width: double
          height: double
          bold: true
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: |-
            {%- set shopping = state_attr('sensor.vh_inventory_shopping','shopping') or [] -%}
            {%- set products = state_attr('sensor.vh_inventory_products','products') or [] -%}
            {%- set stores = state_attr('sensor.vh_inventory_stores','stores') or [] -%}
            {%- set out = namespace(lines=[]) -%}
            {%- set order = namespace(list=[]) -%}
            {%- for s in stores if s.store != 'All' -%}{%- set order.list = order.list + [s.store] -%}{%- endfor -%}
            {%- set known = order.list -%}
            {%- set order.list = ['Algemeen'] + order.list -%}
            {%- for gname in order.list -%}
              {%- set sect = namespace(items=[]) -%}
              {%- for it in shopping -%}
                {%- set st = (products|selectattr('id','eq',it.product_id)|map(attribute='store')|first|default('')) -%}
                {%- set match = (st not in known) if gname == 'Algemeen' else (st == gname) -%}
                {%- if match -%}{%- set sect.items = sect.items + [ it.product ~ ((' (' ~ it.quantity ~ 'x)') if (it.quantity|int(1))>1 else '') ] -%}{%- endif -%}
              {%- endfor -%}
              {%- if sect.items | length > 0 -%}
                {%- if out.lines | length > 0 -%}{%- set out.lines = out.lines + [''] -%}{%- endif -%}
                {%- set out.lines = out.lines + [ gname ] + [ '-' * 44 ] -%}
                {%- for label in sect.items -%}
                  {%- set words = label.split(' ') -%}
                  {%- set ws = namespace(lines=[], current=[], current_length=0) -%}
                  {%- for word in words -%}
                    {%- if ws.current_length == 0 -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}
                    {%- elif ws.current_length + 1 + (word | length) <= 44 -%}{%- set ws.current = ws.current + [word] -%}{%- set ws.current_length = ws.current_length + 1 + (word | length) -%}
                    {%- else -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}{%- endif -%}
                  {%- endfor -%}
                  {%- if ws.current | length > 0 -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- endif -%}
                  {%- for line in ws.lines -%}
                    {%- if loop.first -%}{%- set out.lines = out.lines + ['■ ' ~ line] -%}{%- else -%}{%- set out.lines = out.lines + ['  ' ~ line] -%}{%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set out.lines = out.lines + [''] -%}
            {%- for i in range(10) -%}{%- set out.lines = out.lines + ['■ ' ~ '_' * 42] + [''] -%}{%- endfor -%}
            {{ out.lines | join('\n') }}
          align: left
          width: normal
          height: normal
          bold: false
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "Afgedrukt op {{ now().strftime('%d-%m-%Y %H:%M') }}"
          align: center
          width: normal
          height: normal
          bold: false
          cut: partial
          feed: 3
  vh_print_inventory:
    alias: VH Print Inventory List
    description: >-
      Print the full VH-Inventory stock overview to the Epson TM-T20II (ESC/POS)
      thermal printer. Lists every product with total quantity > 0 (summed across
      locations), grouped per category; products with no category go under a
      final "Algemeen" section. Product name left, total quantity right-aligned.
      Reads sensor.vh_inventory_stock and sensor.vh_inventory_categories.
    sequence:
      - variables:
          body_text: |-
            {%- set stock = state_attr('sensor.vh_inventory_stock','stock') or [] -%}
            {%- set cats = state_attr('sensor.vh_inventory_categories','categories') or [] -%}
            {%- set pids = stock | map(attribute='product_id') | unique | list -%}
            {%- set agg = namespace(items=[]) -%}
            {%- for pid in pids -%}
              {%- set rows = stock | selectattr('product_id','eq',pid) | list -%}
              {%- set qty = rows | map(attribute='quantity') | map('int',0) | sum -%}
              {%- if qty > 0 -%}
                {%- set nm = rows | map(attribute='product') | first -%}
                {%- set ct = rows | map(attribute='category') | first | default('') -%}
                {%- set agg.items = agg.items + [ {'name': nm, 'qty': qty, 'cat': (ct if ct else 'Algemeen')} ] -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set order = namespace(list=[]) -%}
            {%- for c in cats -%}{%- set order.list = order.list + [c.category] -%}{%- endfor -%}
            {%- set known = order.list -%}
            {%- set order.list = order.list + ['Algemeen'] -%}
            {%- set out = namespace(lines=[]) -%}
            {%- for gname in order.list -%}
              {%- if gname == 'Algemeen' -%}
                {%- set sect = agg.items | rejectattr('cat','in',known) | list -%}
              {%- else -%}
                {%- set sect = agg.items | selectattr('cat','eq',gname) | list -%}
              {%- endif -%}
              {%- if sect | length > 0 -%}
                {%- if out.lines | length > 0 -%}{%- set out.lines = out.lines + [''] -%}{%- endif -%}
                {%- set out.lines = out.lines + [ gname ] + [ '-' * 44 ] -%}
                {%- for it in sect -%}
                  {%- set qstr = it.qty | string -%}
                  {%- set wname = 44 - (qstr | length) - 1 -%}
                  {%- set words = it.name.split(' ') -%}
                  {%- set ws = namespace(lines=[], current=[], current_length=0) -%}
                  {%- for word in words -%}
                    {%- if ws.current_length == 0 -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}
                    {%- elif ws.current_length + 1 + (word | length) <= wname -%}{%- set ws.current = ws.current + [word] -%}{%- set ws.current_length = ws.current_length + 1 + (word | length) -%}
                    {%- else -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}{%- endif -%}
                  {%- endfor -%}
                  {%- if ws.current | length > 0 -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- endif -%}
                  {%- for line in ws.lines -%}
                    {%- if loop.first -%}
                      {%- set pad = 44 - (line | length) - (qstr | length) -%}
                      {%- if pad < 1 -%}{%- set pad = 1 -%}{%- endif -%}
                      {%- set out.lines = out.lines + [ line ~ ' ' * pad ~ qstr ] -%}
                    {%- else -%}
                      {%- set out.lines = out.lines + [ line ] -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
            {{ out.lines | join('\n') }}
      - service: escpos_printer.print_text
        data:
          text: "\nVoorraad lijst"
          align: center
          width: double
          height: double
          bold: true
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "{{ body_text }}"
          align: left
          width: normal
          height: normal
          bold: false
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "Afgedrukt op {{ now().strftime('%d-%m-%Y %H:%M') }}"
          align: center
          width: normal
          height: normal
          bold: false
          cut: partial
          feed: 3

# ---------------------------------------------------------------------------
# Hardware barcode scanners (ESPHome) -> VH Inventory scan queue.
# The ESPHome scanner fires esphome.scanner_product with data.device and
# data.barcode. The device's select.<device>_scanner_mode chooses the action:
#   Toevoegen -> Add, Gebruiken -> Use. Non-product modes fire
#   esphome.scanner_generic and are ignored here. This applies the exact same
#   logic as a manually typed barcode via pyscript.vh_inventory_scan_enqueue.
# Currently scoped to barcode-01, barcode-02 and scanner-01; to add another scanner, extend
# the device condition below (the mode entity is derived from the device name).
# ---------------------------------------------------------------------------
automation:
  - id: vh_inventory_barcode_scanned
    alias: VH Inventory - Barcode Scanned
    description: >-
      Feed ESPHome scanner product scans into the VH Inventory scan queue,
      applying the same logic as a manually typed barcode. The scanner mode
      select (Toevoegen=Add / Gebruiken=Use) chooses the action.
    mode: queued
    max: 10
    triggers:
      - trigger: event
        event_type: esphome.scanner_product
    conditions:
      - condition: template
        value_template: "{{ (trigger.event.data.device | default('')) in ['barcode-01', 'barcode-02', 'scanner-01'] }}"
      - condition: template
        value_template: "{{ (trigger.event.data.barcode | default('') | string | trim) != '' }}"
    variables:
      scanner_mode_entity: >-
        select.{{ (trigger.event.data.device | default('barcode-01')) | replace('-', '_') }}_scanner_mode
      scan_action: >-
        {{ 'Add' if is_state(scanner_mode_entity, 'Toevoegen')
           else ('Use' if is_state(scanner_mode_entity, 'Gebruiken') else '') }}
    actions:
      - condition: template
        value_template: "{{ scan_action in ['Add', 'Use'] }}"
      - service: pyscript.vh_inventory_scan_enqueue
        data:
          barcode: "{{ trigger.event.data.barcode }}"
          action: "{{ scan_action }}"
          device: "{{ trigger.event.data.device }}"

  - id: vh_inventory_stock_product_changed
    alias: VH Inventory - Reload product fields on stock product change
    description: >-
      When the product selected in the Edit/Add Inventory popup
      (input_select.vh_stock_product) changes, reload the product-detail fields
      (Barcode/Manufacturer/Unit/Category) so they always reflect the chosen
      product. This keeps the Edit Inventory popup's product-detail editing
      consistent when the product dropdown is changed. Harmless for the Add
      Inventory popup (those fields are not shown there).
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: input_select.vh_stock_product
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.to_state is not none
             and trigger.to_state.state not in ['unknown', 'unavailable'] }}
    actions:
      - service: pyscript.vh_inventory_load_stock_product_fields

  - id: vh_inventory_print_shopping_switch
    alias: VH Inventory - Print Shopping List (scanner switch)
    description: >-
      When either scanner's "Print Shopping list" switch
      (switch.barcode_01_print_shopping_list / switch.barcode_02_print_shopping_list)
      is turned on, run the same action as the shopping-list Afdrukken button
      (script.vh_print_shopping), then turn both switches back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_print_shopping_list
          - switch.barcode_02_print_shopping_list
        to: "on"
    actions:
      - service: script.vh_print_shopping
      - service: switch.turn_off
        target:
          entity_id:
            - switch.barcode_01_print_shopping_list
            - switch.barcode_02_print_shopping_list

  - id: vh_inventory_print_inventory_switch
    alias: VH Inventory - Print Inventory List (scanner switch)
    description: >-
      When either scanner's "Print Inventory list" switch
      (switch.barcode_01_print_inventory_list / switch.barcode_02_print_inventory_list)
      is turned on, print the stock overview (script.vh_print_inventory), then
      turn both switches back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_print_inventory_list
          - switch.barcode_02_print_inventory_list
        to: "on"
    actions:
      - service: script.vh_print_inventory
      - service: switch.turn_off
        target:
          entity_id:
            - switch.barcode_01_print_inventory_list
            - switch.barcode_02_print_inventory_list

  - id: vh_inventory_popup_yes
    alias: VH Inventory - Popup Yes button (barcode-01/02)
    description: >-
      When either large-screen scanner's popup "Yes" button is pressed
      (switch.barcode_01_popup_yes or switch.barcode_02_popup_yes turns on), run
      the context-aware confirm handler (pyscript.vh_inventory_popup_confirm):
      for the Add-mode similarity popup it removes the matched product from the
      shopping list; for the Use-mode alt-stock popup it adds the just-emptied
      product to the shopping list. Then close the info popup on the scanner that
      fired (switch.<dev>_popup off) and reset that scanner's Yes switch back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_popup_yes
          - switch.barcode_02_popup_yes
        to: "on"
    actions:
      - service: pyscript.vh_inventory_popup_confirm
      - service: switch.turn_off
        target:
          entity_id:
            - "{{ trigger.entity_id | replace('_popup_yes', '_popup') }}"
            - "{{ trigger.entity_id }}"

  - id: vh_inventory_popup_no
    alias: VH Inventory - Popup No button (barcode-01/02)
    description: >-
      When either large-screen scanner's popup "No" button is pressed
      (switch.barcode_01_popup_no or switch.barcode_02_popup_no turns on), run
      the context-aware dismiss handler (pyscript.vh_inventory_popup_dismiss) —
      for the alt-stock popup it records that the product was kept off the
      shopping list — then close the info popup on the scanner that fired
      (switch.<dev>_popup off) and reset that scanner's No switch back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_popup_no
          - switch.barcode_02_popup_no
        to: "on"
    actions:
      - service: pyscript.vh_inventory_popup_dismiss
      - service: switch.turn_off
        target:
          entity_id:
            - "{{ trigger.entity_id | replace('_popup_no', '_popup') }}"
            - "{{ trigger.entity_id }}"

  - id: vh_inventory_announce
    alias: VH Inventory - TTS Announcement
    description: >-
      Decoupled TTS announcements for VH-Inventory. Listens for the
      vh_inventory_announce event fired by the pyscript backend and speaks a
      Dutch chime-tts message on the selected Sonos players. Runs in parallel
      and fully independently of the inventory logic, so slow/failed TTS can
      never affect core functionality. Handles the "added to the shopping list"
      (kind == shopping_add) and "scanned barcode could not be resolved"
      (kind == scan_unresolved) announcements, plus "consumed
      from the inventory with stock remaining, via ANY scanner" (kind ==
      scan_used, quantity >= 1) and "a scanned product looks similar to a
      shopping-list item" (kind == similar_found), plus "the last unit was
      consumed but a similar product is still in stock" (kind == alt_in_stock),
      each gated by its own toggle.
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: state
        entity_id: input_boolean.vh_tts_enabled
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_tts_media_players') | trim) != '' }}"
      - condition: template
        value_template: >-
          {{ (trigger.event.data.kind == 'shopping_add'
                and is_state('input_boolean.vh_tts_announce_shopping_add', 'on'))
             or (trigger.event.data.kind == 'scan_unresolved'
                and is_state('input_boolean.vh_tts_announce_scan_unresolved', 'on'))
             or (trigger.event.data.kind == 'scan_used'
                and (trigger.event.data.quantity | default(0) | int) >= 1
                and is_state('input_boolean.vh_tts_announce_scan_used', 'on'))
             or (trigger.event.data.kind == 'similar_found'
                and is_state('input_boolean.vh_tts_announce_similar', 'on'))
             or (trigger.event.data.kind == 'alt_in_stock'
                and is_state('input_boolean.vh_tts_announce_alt_stock', 'on')) }}
    variables:
      players: >-
        {{ states('input_text.vh_tts_media_players').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      volume: "{{ states('input_number.vh_tts_volume') | float(40) / 100 }}"
      product: "{{ trigger.event.data.product | default('') | trim }}"
      scanned: "{{ trigger.event.data.scanned | default('') | trim }}"
      matched: "{{ trigger.event.data.matched | default('') | trim }}"
      alt: "{{ trigger.event.data.alt | default('') | trim }}"
      message: >-
        {% if trigger.event.data.kind == 'scan_unresolved' %}
        {% set t = states('input_text.vh_tts_msg_scan_unresolved') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'Onbekende streepjescode gescand. Handmatige invoer nodig.' %}
        {% endif %}
        {{ t }}
        {% elif trigger.event.data.kind == 'scan_used' %}
        {% set qty = trigger.event.data.quantity | default(0) %}
        {% set t = states('input_text.vh_tts_msg_scan_used') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} verbruikt, nog {qty} op voorraad.' %}
        {% endif %}
        {{ t | replace('{product}', product) | replace('{qty}', qty | string) }}
        {% elif trigger.event.data.kind == 'similar_found' %}
        {% set t = states('input_text.vh_tts_msg_similar') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'Is {scanned_product} hetzelfde als {matched_product}, check de display' %}
        {% endif %}
        {{ t | replace('{scanned_product}', scanned) | replace('{matched_product}', matched) }}
        {% elif trigger.event.data.kind == 'alt_in_stock' %}
        {% set t = states('input_text.vh_tts_msg_alt_stock') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'Dit was het laatste item {scanned_product}, maar er is nog {alt_product} op voorraad die je kunt gebruiken.' %}
        {% endif %}
        {{ t | replace('{scanned_product}', scanned) | replace('{alt_product}', alt) }}
        {% else %}
        {% set t = states('input_text.vh_tts_msg_shopping_add') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de boodschappen lijst.' %}
        {% endif %}
        {{ t | replace('{product}', product) }}
        {% endif %}
    actions:
      - service: chime_tts.say
        target:
          entity_id: "{{ players }}"
        data:
          chime_path: bells
          offset: 450
          final_delay: 0
          tts_speed: 100
          tts_pitch: 0
          volume_level: "{{ volume }}"
          message: "{{ message | trim }}"
          tts_platform: cloud
          announce: true

  - id: vh_inventory_notify_mobile
    alias: VH Inventory - Mobile Notification
    description: >-
      Decoupled mobile push notifications for VH-Inventory. Listens for the
      same vh_inventory_announce event fired by the pyscript backend and sends
      a push notification to the selected mobile_app devices when a product is
      added to the shopping list (kind == shopping_add). Runs in parallel and
      fully independently of the inventory logic, so a slow/failed notification
      can never affect core functionality. The message text is configurable via
      input_text.vh_notify_msg_shopping_add (with a {product} placeholder).
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: template
        value_template: "{{ trigger.event.data.kind == 'shopping_add' }}"
      - condition: state
        entity_id: input_boolean.vh_notify_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.vh_notify_shopping_add
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_notify_devices') | trim) != '' }}"
    variables:
      devices: >-
        {{ states('input_text.vh_notify_devices').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      product: "{{ trigger.event.data.product | default('') | trim }}"
      message: >-
        {% set t = states('input_text.vh_notify_msg_shopping_add') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de boodschappen lijst.' %}
        {% endif %}
        {{ t | replace('{product}', product) }}
    actions:
      - repeat:
          for_each: "{{ devices }}"
          sequence:
            - service: "notify.{{ repeat.item }}"
              data:
                title: Boodschappenlijst
                message: "{{ message | trim }}"

  - id: vh_inventory_notify_ai_degraded
    alias: VH Inventory - AI Matching Health Notification
    description: >-
      Decoupled mobile push telling the user that semantic (AI) product matching
      is unavailable and the basic string matcher is being used, or that the
      conversation agent's daily request limit is reached/approaching. Listens for
      the vh_inventory_announce event (kind == ai_match_degraded) fired by the
      pyscript backend when a Gemini call fails (e.g. HTTP 429 quota) or when usage
      crosses the configured daily limit. The backend throttles these events to at
      most once per hour. Runs in parallel and fully independently of the inventory
      logic. Message text is configurable via input_text.vh_notify_msg_ai_degraded.
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: template
        value_template: "{{ trigger.event.data.kind == 'ai_match_degraded' }}"
      - condition: state
        entity_id: input_boolean.vh_notify_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.vh_notify_ai_degraded
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_notify_devices') | trim) != '' }}"
    variables:
      devices: >-
        {{ states('input_text.vh_notify_devices').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      reason: "{{ trigger.event.data.reason | default('') }}"
      calls: "{{ trigger.event.data.calls | default(0) }}"
      limit: "{{ trigger.event.data.limit | default(0) }}"
      message: >-
        {% if reason == 'limit' %}
        {% set t = 'AI-matchlimiet bereikt ({calls}/{limit} vandaag); basismatching wordt gebruikt.' %}
        {% elif reason == 'approaching' %}
        {% set t = 'AI-matchgebruik nadert de daglimiet ({calls}/{limit}).' %}
        {% else %}
        {% set t = states('input_text.vh_notify_msg_ai_degraded') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'AI-productmatching is niet beschikbaar (limiet of fout); basismatching wordt gebruikt.' %}
        {% endif %}
        {% endif %}
        {{ t | replace('{calls}', calls|string) | replace('{limit}', limit|string) }}
    actions:
      - repeat:
          for_each: "{{ devices }}"
          sequence:
            - service: "notify.{{ repeat.item }}"
              data:
                title: VH-Inventory
                message: "{{ message | trim }}"

  - id: vh_inventory_mqtt_topic_changed
    alias: VH Inventory - Reload On MQTT Topic Change
    description: >-
      The handheld scanner's MQTT subscription (@mqtt_trigger in the pyscript app)
      binds its topic at load time. When the user edits input_text.vh_mqtt_topic on
      the Setup tab, reload the pyscript app so the trigger re-subscribes to the new
      topic. Ignores transient unknown/unavailable states so a restart does not
      trigger a spurious reload.
    mode: single
    triggers:
      - trigger: state
        entity_id: input_text.vh_mqtt_topic
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.to_state.state not in ['unknown', 'unavailable', '']
             and trigger.from_state is not none
             and trigger.from_state.state not in ['unknown', 'unavailable'] }}
    actions:
      - service: pyscript.reload

  - id: vh_inventory_seed_defaults
    alias: VH Inventory - Seed Setting Defaults
    description: >-
      On Home Assistant start, seed the TTS/notify setting helpers with sensible
      defaults ONLY when they are still uninitialised (state unknown/unavailable),
      e.g. on a fresh install or first boot after adding the package. These helpers
      deliberately have NO `initial:` so that user changes (selected speakers/devices,
      edited messages, volume) persist across restarts; without this an `initial:`
      would reset them on every restart. Values that are already set are left
      untouched (each set_value falls back to the current state).
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.vh_tts_volume
        data:
          value: >-
            {{ 40 if states('input_number.vh_tts_volume') in ['unknown', 'unavailable']
               else states('input_number.vh_tts_volume') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_media_players
        data:
          value: >-
            {{ '' if states('input_text.vh_tts_media_players') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_media_players') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_devices
        data:
          value: >-
            {{ '' if states('input_text.vh_notify_devices') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_devices') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_shopping_add
        data:
          value: >-
            {{ '{product} toegevoegd aan de boodschappen lijst.'
               if states('input_text.vh_tts_msg_shopping_add') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_msg_shopping_add') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_scan_unresolved
        data:
          value: >-
            {{ 'Onbekende streepjescode gescand. Handmatige invoer nodig.'
               if states('input_text.vh_tts_msg_scan_unresolved') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_msg_scan_unresolved') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_scan_used
        data:
          value: >-
            {{ '{product} verbruikt, nog {qty} op voorraad.'
               if states('input_text.vh_tts_msg_scan_used') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_msg_scan_used') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_similar
        data:
          value: >-
            {{ 'Is {scanned_product} hetzelfde als {matched_product}, check de display'
               if states('input_text.vh_tts_msg_similar') in ['unknown', 'unavailable', '']
               else states('input_text.vh_tts_msg_similar') }}
      - action: input_number.set_value
        target:
          entity_id: input_number.vh_similarity_threshold
        data:
          value: >-
            {{ 70 if states('input_number.vh_similarity_threshold') in ['unknown', 'unavailable', '0', '0.0']
               else states('input_number.vh_similarity_threshold') }}
      - action: input_number.set_value
        target:
          entity_id: input_number.vh_alt_stock_threshold
        data:
          value: >-
            {{ 90 if states('input_number.vh_alt_stock_threshold') in ['unknown', 'unavailable', '0', '0.0']
               else states('input_number.vh_alt_stock_threshold') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_alt_stock
        data:
          value: >-
            {{ 'Dit was het laatste item {scanned_product}, maar er is nog {alt_product} op voorraad die je kunt gebruiken.'
               if states('input_text.vh_tts_msg_alt_stock') in ['unknown', 'unavailable', '']
               else states('input_text.vh_tts_msg_alt_stock') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_similarity_popup_header
        data:
          value: >-
            {{ 'Similar product found'
               if states('input_text.vh_similarity_popup_header') in ['unknown', 'unavailable', '']
               else states('input_text.vh_similarity_popup_header') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_similarity_msg
        data:
          value: >-
            {{ 'Is {scanned_product} similar to {matched_product}'
               if states('input_text.vh_similarity_msg') in ['unknown', 'unavailable', '']
               else states('input_text.vh_similarity_msg') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_ai_match_agent
        data:
          value: >-
            {{ 'conversation.google_generative_ai'
               if states('input_text.vh_ai_match_agent') in ['unknown', 'unavailable', '']
               else states('input_text.vh_ai_match_agent') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_ai_match_policy
        data:
          value: >-
            {{ 'SAME product = differs only in brand, shop, shelf-life, origin or packaging (e.g. Campina, AH, houdbare, vers, 1L). DIFFERENT = flavour, variety or type differs (Lime/Vanilla/Zero, cola/fanta, magere/volle).'
               if states('input_text.vh_ai_match_policy') in ['unknown', 'unavailable', '']
               else states('input_text.vh_ai_match_policy') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_alt_stock_popup_header
        data:
          value: >-
            {{ 'Toevoegen?'
               if states('input_text.vh_alt_stock_popup_header') in ['unknown', 'unavailable', '']
               else states('input_text.vh_alt_stock_popup_header') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_alt_stock_msg
        data:
          value: >-
            {{ 'Van {alt_product} is de voorraad {alt_stock_qty}, toch toevoegen aan de boodschappenlijst?'
               if states('input_text.vh_alt_stock_msg') in ['unknown', 'unavailable', '']
               else states('input_text.vh_alt_stock_msg') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_shopping_add
        data:
          value: >-
            {{ '{product} toegevoegd aan de boodschappen lijst.'
               if states('input_text.vh_notify_msg_shopping_add') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_shopping_add') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_mqtt_topic
        data:
          value: >-
            {{ 'barcode/scanned'
               if states('input_text.vh_mqtt_topic') in ['unknown', 'unavailable', '']
               else states('input_text.vh_mqtt_topic') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_ai_degraded
        data:
          value: >-
            {{ 'AI-productmatching is niet beschikbaar (limiet of fout); basismatching wordt gebruikt.'
               if states('input_text.vh_notify_msg_ai_degraded') in ['unknown', 'unavailable', '']
               else states('input_text.vh_notify_msg_ai_degraded') }}
      - action: input_number.set_value
        target:
          entity_id: input_number.vh_ai_match_daily_limit
        data:
          value: >-
            {{ 0 if states('input_number.vh_ai_match_daily_limit') in ['unknown', 'unavailable']
               else states('input_number.vh_ai_match_daily_limit') }}
