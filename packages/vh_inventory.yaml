template:
  # Server-side Inventory filter (mirrors production barcode_voorraad_filtered).
  # Accent- and case-insensitive substring match on the product name via the
  # strip_accents macro, so e.g. "cafe" matches "Caffè" and "maiswafel" matches
  # "maïswafels". Re-renders when the search box or the stock sensor changes.
  - trigger:
      - trigger: state
        entity_id:
          - input_text.vh_stock_search
          - input_select.vh_print_category
          - sensor.vh_inventory_stock
      - trigger: homeassistant
        event: start
    sensor:
      - name: VH Inventory Stock Filtered
        unique_id: vh_inventory_stock_filtered
        icon: mdi:clipboard-list-outline
        state: >
          {%- macro strip_accents(text) -%}
            {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
          {%- endmacro -%}
          {% set search = strip_accents(states('input_text.vh_stock_search')) | trim %}
          {% set cat = states('input_select.vh_print_category') %}
          {% set items = state_attr('sensor.vh_inventory_stock','stock') or [] %}
          {% set ns = namespace(count=0) %}
          {% for item in items %}
            {% if (search == '' or search in strip_accents(item.product) | trim
                  or search in strip_accents(item.barcode or '') | trim)
                  and (cat in ['All','','unknown','unavailable'] or (item.category or '') == cat) %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          stock: >
            {%- macro strip_accents(text) -%}
              {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
            {%- endmacro -%}
            {% set search = strip_accents(states('input_text.vh_stock_search')) | trim %}
            {% set cat = states('input_select.vh_print_category') %}
            {% set items = state_attr('sensor.vh_inventory_stock','stock') or [] %}
            {% set ns = namespace(filtered=[]) %}
            {% for item in items %}
              {% if (search == '' or search in strip_accents(item.product) | trim
                    or search in strip_accents(item.barcode or '') | trim)
                    and (cat in ['All','','unknown','unavailable'] or (item.category or '') == cat) %}
                {% set ns.filtered = ns.filtered + [item] %}
              {% endif %}
            {% endfor %}
            {{ ns.filtered }}

  # Products filter (separate search helper so it does NOT share state with the
  # Inventory search). Same accent-insensitive strip_accents matching on name.
  - trigger:
      - trigger: state
        entity_id:
          - input_text.vh_products_search
          - sensor.vh_inventory_products
      - trigger: homeassistant
        event: start
    sensor:
      - name: VH Inventory Products Filtered
        unique_id: vh_inventory_products_filtered
        icon: mdi:package-variant
        state: >
          {%- macro strip_accents(text) -%}
            {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
          {%- endmacro -%}
          {% set search = strip_accents(states('input_text.vh_products_search')) | trim %}
          {% set items = state_attr('sensor.vh_inventory_products','products') or [] %}
          {% if search == '' %}
            {{ items | length }}
          {% else %}
            {% set ns = namespace(count=0) %}
            {% for item in items %}
              {% if search in strip_accents(item.name) | trim
                    or search in strip_accents(item.barcode or '') | trim %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endfor %}
            {{ ns.count }}
          {% endif %}
        attributes:
          products: >
            {%- macro strip_accents(text) -%}
              {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
            {%- endmacro -%}
            {% set search = strip_accents(states('input_text.vh_products_search')) | trim %}
            {% set items = state_attr('sensor.vh_inventory_products','products') or [] %}
            {% if search == '' %}
              {{ items }}
            {% else %}
              {% set ns = namespace(filtered=[]) %}
              {% for item in items %}
                {% if search in strip_accents(item.name) | trim
                      or search in strip_accents(item.barcode or '') | trim %}
                  {% set ns.filtered = ns.filtered + [item] %}
                {% endif %}
              {% endfor %}
              {{ ns.filtered }}
            {% endif %}

  # Add-tab product filter (own search helper). Same accent-insensitive name
  # match as the Products filter; passes through full product dicts (incl.
  # on_shopping) so the button grid can colour each button. Re-renders when the
  # search box or the products sensor (which carries on_shopping) changes.
  - trigger:
      - trigger: state
        entity_id:
          - input_text.vh_shopping_search
          - sensor.vh_inventory_products
      - trigger: homeassistant
        event: start
    sensor:
      - name: VH Inventory Shopping Filtered
        unique_id: vh_inventory_shopping_filtered
        icon: mdi:cart-plus
        state: >
          {%- macro strip_accents(text) -%}
            {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
          {%- endmacro -%}
          {% set search = strip_accents(states('input_text.vh_shopping_search')) | trim %}
          {% set items = state_attr('sensor.vh_inventory_products','products') or [] %}
          {% if search == '' %}
            {{ items | length }}
          {% else %}
            {% set ns = namespace(count=0) %}
            {% for item in items %}
              {% if search in strip_accents(item.name) | trim
                    or search in strip_accents(item.barcode or '') | trim %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endfor %}
            {{ ns.count }}
          {% endif %}
        attributes:
          products: >
            {%- macro strip_accents(text) -%}
              {{ text | string | lower | replace('é','e') | replace('è','e') | replace('ê','e') | replace('ë','e') | replace('à','a') | replace('á','a') | replace('â','a') | replace('ä','a') | replace('ö','o') | replace('ó','o') | replace('ô','o') | replace('ü','u') | replace('ú','u') | replace('û','u') | replace('ù','u') | replace('ï','i') | replace('í','i') | replace('î','i') | replace('ç','c') | replace('ñ','n') }}
            {%- endmacro -%}
            {% set search = strip_accents(states('input_text.vh_shopping_search')) | trim %}
            {% set items = state_attr('sensor.vh_inventory_products','products') or [] %}
            {% if search == '' %}
              {{ items }}
            {% else %}
              {% set ns = namespace(filtered=[]) %}
              {% for item in items %}
                {% if search in strip_accents(item.name) | trim
                      or search in strip_accents(item.barcode or '') | trim %}
                  {% set ns.filtered = ns.filtered + [item] %}
                {% endif %}
              {% endfor %}
              {{ ns.filtered }}
            {% endif %}

input_boolean:
  vh_product_auto_add_enabled:
    name: VH Product Auto-Add Enabled
  vh_show_id_columns:
    name: VH Show ID Columns
    icon: mdi:identifier
  vh_kiosk_mode:
    name: VH Kiosk Mode
    icon: mdi:fullscreen
  vh_tts_enabled:
    name: VH TTS Enabled
    icon: mdi:bullhorn
  vh_tts_announce_shopping_add:
    name: VH TTS Announce Shopping Add
    icon: mdi:cart-plus
  vh_tts_announce_scan_unresolved:
    name: VH TTS Announce Scan Unresolved
    icon: mdi:barcode-off
  vh_notify_enabled:
    name: VH Notify Enabled
    icon: mdi:cellphone-message
  vh_notify_shopping_add:
    name: VH Notify Shopping Add
    icon: mdi:cart-plus
  vh_notify_scan_added:
    name: VH Notify Scan Added
    icon: mdi:barcode-scan
  vh_handheld_use_mode:
    name: VH Handheld Use Mode
    icon: mdi:swap-horizontal

input_select:
  vh_language:
    name: VH Language
    icon: mdi:translate
    options:
      - English
      - Nederlands
  vh_product_category:
    name: VH Product Category
    options: ["(none)"]
  vh_product_store:
    name: VH Product Store
    options: ["(none)"]
  vh_stock_product:
    name: VH Stock Product
    options: ["(none)"]
  vh_stock_location:
    name: VH Stock Location
    options: ["(none)"]
  vh_shopping_product:
    name: VH Shopping Product
    options: ["(none)"]
  vh_print_category:
    name: VH Print Category
    icon: mdi:shape
    options: ["All"]
    initial: All
  # Handheld scanner mode-button colours (Setup tab). NO `initial:` so the user's
  # choice persists across restarts (restore_state). On a fresh install each falls
  # back to its FIRST option, which is why the two share the same palette but with
  # a different leading colour: Add -> Cyan, Use -> Red (the historic defaults).
  vh_handheld_add_color:
    name: VH Handheld Add Color
    icon: mdi:palette
    options: ["Cyan", "Red", "Green", "Amber", "Blue", "Purple", "Orange", "Pink", "Teal", "Grey"]
  vh_handheld_use_color:
    name: VH Handheld Use Color
    icon: mdi:palette
    options: ["Red", "Cyan", "Green", "Amber", "Blue", "Purple", "Orange", "Pink", "Teal", "Grey"]

input_number:
  vh_product_auto_add_threshold:
    name: VH Product Auto-Add Threshold
    min: 0
    max: 999
    step: 1
    mode: box
    initial: 1
  vh_product_auto_add_quantity:
    name: VH Product Auto-Add Quantity
    min: 1
    max: 999
    step: 1
    mode: box
    initial: 1
  vh_stock_quantity:
    name: VH Stock Quantity
    min: 0
    max: 99999
    step: 1
    mode: box
    initial: 1
  vh_shopping_quantity:
    name: VH Shopping Quantity
    min: 0
    max: 99999
    step: 1
    mode: box
    initial: 1
  vh_tts_volume:
    name: VH TTS Volume
    min: 0
    max: 100
    step: 5
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:volume-high

script:
  vh_save_product:
    alias: VH Save Product
    sequence:
      - service: pyscript.vh_inventory_add_product
        data:
          name: "{{ states('input_text.vh_product_name') }}"
          barcode: "{{ states('input_text.vh_product_barcode') }}"
          description: "{{ states('input_text.vh_product_description') }}"
          manufacturer: "{{ states('input_text.vh_product_manufacturer') }}"
          unit: "{{ states('input_text.vh_product_unit') }}"
          auto_add_enabled: "{{ 1 if is_state('input_boolean.vh_product_auto_add_enabled','on') else 0 }}"
          auto_add_threshold: "{{ states('input_number.vh_product_auto_add_threshold')|int }}"
          auto_add_quantity: "{{ states('input_number.vh_product_auto_add_quantity')|int }}"
          category: "{{ states('input_select.vh_product_category') }}"
          store: "{{ states('input_select.vh_product_store') }}"
      - service: input_text.set_value
        target: {entity_id: [input_text.vh_product_name, input_text.vh_product_barcode, input_text.vh_product_description, input_text.vh_product_manufacturer, input_text.vh_product_unit]}
        data: {value: ""}
  vh_save_resolved_product:
    alias: VH Save Resolved Product
    sequence:
      - service: pyscript.vh_inventory_save_resolved
        data:
          name: "{{ states('input_text.vh_product_name') }}"
          barcode: "{{ states('input_text.vh_product_barcode') }}"
          description: "{{ states('input_text.vh_product_description') }}"
          manufacturer: "{{ states('input_text.vh_product_manufacturer') }}"
          unit: "{{ states('input_text.vh_product_unit') }}"
          auto_add_enabled: "{{ 1 if is_state('input_boolean.vh_product_auto_add_enabled','on') else 0 }}"
          auto_add_threshold: "{{ states('input_number.vh_product_auto_add_threshold')|int }}"
          auto_add_quantity: "{{ states('input_number.vh_product_auto_add_quantity')|int }}"
          category: "{{ states('input_select.vh_product_category') }}"
          store: "{{ states('input_select.vh_product_store') }}"
      - service: input_text.set_value
        target: {entity_id: [input_text.vh_product_name, input_text.vh_product_barcode, input_text.vh_product_description, input_text.vh_product_manufacturer, input_text.vh_product_unit, input_text.vh_pending_scan_id]}
        data: {value: ""}
  vh_save_location:
    alias: VH Save Location
    sequence:
      - service: pyscript.vh_inventory_add_location
        data: {location: "{{ states('input_text.vh_new_location') }}"}
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_location}
        data: {value: ""}
  vh_save_category:
    alias: VH Save Category
    sequence:
      - service: pyscript.vh_inventory_add_category
        data: {category: "{{ states('input_text.vh_new_category') }}"}
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_category}
        data: {value: ""}
  vh_save_store:
    alias: VH Save Store
    sequence:
      - service: pyscript.vh_inventory_add_store
        data: {store: "{{ states('input_text.vh_new_store') }}"}
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_store}
        data: {value: ""}
  vh_scan_add:
    alias: VH Scan Add
    sequence:
      - service: pyscript.vh_inventory_scan_enqueue
        data:
          barcode: "{{ states('input_text.vh_scan_barcode') }}"
          action: Add
      - service: input_text.set_value
        target: {entity_id: input_text.vh_scan_barcode}
        data: {value: ""}
  vh_scan_use:
    alias: VH Scan Use
    sequence:
      - service: pyscript.vh_inventory_scan_enqueue
        data:
          barcode: "{{ states('input_text.vh_scan_barcode') }}"
          action: Use
      - service: input_text.set_value
        target: {entity_id: input_text.vh_scan_barcode}
        data: {value: ""}
  vh_update_product:
    alias: VH Update Product
    sequence:
      - service: pyscript.vh_inventory_update_product
        data:
          id: "{{ states('input_text.vh_edit_product_id') }}"
          name: "{{ states('input_text.vh_product_name') }}"
          barcode: "{{ states('input_text.vh_product_barcode') }}"
          description: "{{ states('input_text.vh_product_description') }}"
          manufacturer: "{{ states('input_text.vh_product_manufacturer') }}"
          unit: "{{ states('input_text.vh_product_unit') }}"
          auto_add_enabled: "{{ 1 if is_state('input_boolean.vh_product_auto_add_enabled','on') else 0 }}"
          auto_add_threshold: "{{ states('input_number.vh_product_auto_add_threshold')|int }}"
          auto_add_quantity: "{{ states('input_number.vh_product_auto_add_quantity')|int }}"
          category: "{{ states('input_select.vh_product_category') }}"
          store: "{{ states('input_select.vh_product_store') }}"
  vh_update_location:
    alias: VH Update Location
    sequence:
      - service: pyscript.vh_inventory_update_simple
        data:
          table: locations
          id: "{{ states('input_text.vh_edit_location_id') }}"
          value: "{{ states('input_text.vh_new_location') }}"
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_location}
        data: {value: ""}
  vh_update_category:
    alias: VH Update Category
    sequence:
      - service: pyscript.vh_inventory_update_simple
        data:
          table: categories
          id: "{{ states('input_text.vh_edit_category_id') }}"
          value: "{{ states('input_text.vh_new_category') }}"
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_category}
        data: {value: ""}
  vh_update_store:
    alias: VH Update Store
    sequence:
      - service: pyscript.vh_inventory_update_simple
        data:
          table: stores
          id: "{{ states('input_text.vh_edit_store_id') }}"
          value: "{{ states('input_text.vh_new_store') }}"
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_store}
        data: {value: ""}
  vh_save_stock:
    alias: VH Save Stock
    sequence:
      - service: pyscript.vh_inventory_add_stock
        data:
          product: "{{ states('input_select.vh_stock_product') }}"
          location: "{{ states('input_select.vh_stock_location') }}"
          quantity: "{{ states('input_number.vh_stock_quantity')|int }}"
  vh_update_stock:
    alias: VH Update Stock
    sequence:
      - service: pyscript.vh_inventory_update_stock
        data:
          id: "{{ states('input_text.vh_edit_stock_id') }}"
          product: "{{ states('input_select.vh_stock_product') }}"
          location: "{{ states('input_select.vh_stock_location') }}"
          quantity: "{{ states('input_number.vh_stock_quantity')|int }}"
  vh_save_shopping:
    alias: VH Save Shopping
    sequence:
      - service: pyscript.vh_inventory_add_shopping
        data:
          product: "{{ states('input_select.vh_shopping_product') }}"
          quantity: "{{ states('input_number.vh_shopping_quantity')|int }}"
  vh_update_shopping:
    alias: VH Update Shopping
    sequence:
      - service: pyscript.vh_inventory_update_shopping
        data:
          id: "{{ states('input_text.vh_edit_shopping_id') }}"
          product: "{{ states('input_select.vh_shopping_product') }}"
          quantity: "{{ states('input_number.vh_shopping_quantity')|int }}"
  vh_reset_stock_add:
    alias: VH Reset Stock Add
    sequence:
      - service: input_select.select_first
        target: {entity_id: [input_select.vh_stock_product, input_select.vh_stock_location]}
      - service: input_number.set_value
        target: {entity_id: input_number.vh_stock_quantity}
        data: {value: 1}
  vh_reset_shopping_add:
    alias: VH Reset Shopping Add
    sequence:
      - service: input_select.select_first
        target: {entity_id: input_select.vh_shopping_product}
      - service: input_number.set_value
        target: {entity_id: input_number.vh_shopping_quantity}
        data: {value: 1}
  vh_reset_product_add:
    alias: VH Reset Product Add
    sequence:
      - service: input_text.set_value
        target:
          entity_id:
            - input_text.vh_product_name
            - input_text.vh_product_barcode
            - input_text.vh_product_manufacturer
            - input_text.vh_product_unit
            - input_text.vh_product_description
        data: {value: ""}
      - service: input_select.select_first
        target: {entity_id: [input_select.vh_product_category, input_select.vh_product_store]}
      - service: input_boolean.turn_off
        target: {entity_id: input_boolean.vh_product_auto_add_enabled}
      - service: input_number.set_value
        target:
          entity_id:
            - input_number.vh_product_auto_add_threshold
            - input_number.vh_product_auto_add_quantity
        data: {value: 1}
  vh_reset_location_add:
    alias: VH Reset Location Add
    sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_location}
        data: {value: ""}
  vh_reset_category_add:
    alias: VH Reset Category Add
    sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_category}
        data: {value: ""}
  vh_reset_store_add:
    alias: VH Reset Store Add
    sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.vh_new_store}
        data: {value: ""}
  vh_print_shopping:
    alias: VH Print Shopping List
    description: >-
      Print the VH-Inventory shopping list to the Epson TM-T20II (ESC/POS)
      thermal printer, grouped per store (bold store header + its items). Items
      whose product has no store or store "All" go under a final "Algemeen"
      section. Reads sensor.vh_inventory_shopping and sensor.vh_inventory_products.
    sequence:
      - service: escpos_printer.print_text
        data:
          text: "\nBoodschappenlijst"
          align: center
          width: double
          height: double
          bold: true
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: |-
            {%- set shopping = state_attr('sensor.vh_inventory_shopping','shopping') or [] -%}
            {%- set products = state_attr('sensor.vh_inventory_products','products') or [] -%}
            {%- set stores = state_attr('sensor.vh_inventory_stores','stores') or [] -%}
            {%- set out = namespace(lines=[]) -%}
            {%- set order = namespace(list=[]) -%}
            {%- for s in stores if s.store != 'All' -%}{%- set order.list = order.list + [s.store] -%}{%- endfor -%}
            {%- set known = order.list -%}
            {%- set order.list = ['Algemeen'] + order.list -%}
            {%- for gname in order.list -%}
              {%- set sect = namespace(items=[]) -%}
              {%- for it in shopping -%}
                {%- set st = (products|selectattr('id','eq',it.product_id)|map(attribute='store')|first|default('')) -%}
                {%- set match = (st not in known) if gname == 'Algemeen' else (st == gname) -%}
                {%- if match -%}{%- set sect.items = sect.items + [ it.product ~ ((' (' ~ it.quantity ~ 'x)') if (it.quantity|int(1))>1 else '') ] -%}{%- endif -%}
              {%- endfor -%}
              {%- if sect.items | length > 0 -%}
                {%- if out.lines | length > 0 -%}{%- set out.lines = out.lines + [''] -%}{%- endif -%}
                {%- set out.lines = out.lines + [ gname ] + [ '-' * 44 ] -%}
                {%- for label in sect.items -%}
                  {%- set words = label.split(' ') -%}
                  {%- set ws = namespace(lines=[], current=[], current_length=0) -%}
                  {%- for word in words -%}
                    {%- if ws.current_length == 0 -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}
                    {%- elif ws.current_length + 1 + (word | length) <= 44 -%}{%- set ws.current = ws.current + [word] -%}{%- set ws.current_length = ws.current_length + 1 + (word | length) -%}
                    {%- else -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}{%- endif -%}
                  {%- endfor -%}
                  {%- if ws.current | length > 0 -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- endif -%}
                  {%- for line in ws.lines -%}
                    {%- if loop.first -%}{%- set out.lines = out.lines + ['■ ' ~ line] -%}{%- else -%}{%- set out.lines = out.lines + ['  ' ~ line] -%}{%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set out.lines = out.lines + [''] -%}
            {%- for i in range(10) -%}{%- set out.lines = out.lines + ['■ ' ~ '_' * 42] + [''] -%}{%- endfor -%}
            {{ out.lines | join('\n') }}
          align: left
          width: normal
          height: normal
          bold: false
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "Afgedrukt op {{ now().strftime('%d-%m-%Y %H:%M') }}"
          align: center
          width: normal
          height: normal
          bold: false
          cut: partial
          feed: 3
  vh_print_inventory:
    alias: VH Print Inventory List
    description: >-
      Print the full VH-Inventory stock overview to the Epson TM-T20II (ESC/POS)
      thermal printer. Lists every product with total quantity > 0 (summed across
      locations), grouped per category; products with no category go under a
      final "Algemeen" section. Product name left, total quantity right-aligned.
      Reads sensor.vh_inventory_stock and sensor.vh_inventory_categories.
    sequence:
      - variables:
          body_text: |-
            {%- set stock = state_attr('sensor.vh_inventory_stock','stock') or [] -%}
            {%- set cats = state_attr('sensor.vh_inventory_categories','categories') or [] -%}
            {%- set pids = stock | map(attribute='product_id') | unique | list -%}
            {%- set agg = namespace(items=[]) -%}
            {%- for pid in pids -%}
              {%- set rows = stock | selectattr('product_id','eq',pid) | list -%}
              {%- set qty = rows | map(attribute='quantity') | map('int',0) | sum -%}
              {%- if qty > 0 -%}
                {%- set nm = rows | map(attribute='product') | first -%}
                {%- set ct = rows | map(attribute='category') | first | default('') -%}
                {%- set agg.items = agg.items + [ {'name': nm, 'qty': qty, 'cat': (ct if ct else 'Algemeen')} ] -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set order = namespace(list=[]) -%}
            {%- for c in cats -%}{%- set order.list = order.list + [c.category] -%}{%- endfor -%}
            {%- set known = order.list -%}
            {%- set order.list = order.list + ['Algemeen'] -%}
            {%- set out = namespace(lines=[]) -%}
            {%- for gname in order.list -%}
              {%- if gname == 'Algemeen' -%}
                {%- set sect = agg.items | rejectattr('cat','in',known) | list -%}
              {%- else -%}
                {%- set sect = agg.items | selectattr('cat','eq',gname) | list -%}
              {%- endif -%}
              {%- if sect | length > 0 -%}
                {%- if out.lines | length > 0 -%}{%- set out.lines = out.lines + [''] -%}{%- endif -%}
                {%- set out.lines = out.lines + [ gname ] + [ '-' * 44 ] -%}
                {%- for it in sect -%}
                  {%- set qstr = it.qty | string -%}
                  {%- set wname = 44 - (qstr | length) - 1 -%}
                  {%- set words = it.name.split(' ') -%}
                  {%- set ws = namespace(lines=[], current=[], current_length=0) -%}
                  {%- for word in words -%}
                    {%- if ws.current_length == 0 -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}
                    {%- elif ws.current_length + 1 + (word | length) <= wname -%}{%- set ws.current = ws.current + [word] -%}{%- set ws.current_length = ws.current_length + 1 + (word | length) -%}
                    {%- else -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- set ws.current = [word] -%}{%- set ws.current_length = word | length -%}{%- endif -%}
                  {%- endfor -%}
                  {%- if ws.current | length > 0 -%}{%- set ws.lines = ws.lines + [ws.current | join(' ')] -%}{%- endif -%}
                  {%- for line in ws.lines -%}
                    {%- if loop.first -%}
                      {%- set pad = 44 - (line | length) - (qstr | length) -%}
                      {%- if pad < 1 -%}{%- set pad = 1 -%}{%- endif -%}
                      {%- set out.lines = out.lines + [ line ~ ' ' * pad ~ qstr ] -%}
                    {%- else -%}
                      {%- set out.lines = out.lines + [ line ] -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
            {{ out.lines | join('\n') }}
      - service: escpos_printer.print_text
        data:
          text: "\nVoorraad lijst"
          align: center
          width: double
          height: double
          bold: true
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "{{ body_text }}"
          align: left
          width: normal
          height: normal
          bold: false
          cut: none
          feed: 2
      - service: escpos_printer.print_text
        data:
          text: "Afgedrukt op {{ now().strftime('%d-%m-%Y %H:%M') }}"
          align: center
          width: normal
          height: normal
          bold: false
          cut: partial
          feed: 3

# ---------------------------------------------------------------------------
# Hardware barcode scanners (ESPHome) -> VH Inventory scan queue.
# The ESPHome scanner fires esphome.scanner_product with data.device and
# data.barcode. The device's select.<device>_scanner_mode chooses the action:
#   Toevoegen -> Add, Gebruiken -> Use. Non-product modes fire
#   esphome.scanner_generic and are ignored here. This applies the exact same
#   logic as a manually typed barcode via pyscript.vh_inventory_scan_enqueue.
# Currently scoped to barcode-01 and barcode-02; to add another scanner, extend
# the device condition below (the mode entity is derived from the device name).
# ---------------------------------------------------------------------------
automation:
  - id: vh_inventory_barcode_scanned
    alias: VH Inventory - Barcode Scanned
    description: >-
      Feed ESPHome scanner product scans into the VH Inventory scan queue,
      applying the same logic as a manually typed barcode. The scanner mode
      select (Toevoegen=Add / Gebruiken=Use) chooses the action.
    mode: queued
    max: 10
    triggers:
      - trigger: event
        event_type: esphome.scanner_product
    conditions:
      - condition: template
        value_template: "{{ (trigger.event.data.device | default('')) in ['barcode-01', 'barcode-02'] }}"
      - condition: template
        value_template: "{{ (trigger.event.data.barcode | default('') | string | trim) != '' }}"
    variables:
      scanner_mode_entity: >-
        select.{{ (trigger.event.data.device | default('barcode-01')) | replace('-', '_') }}_scanner_mode
      scan_action: >-
        {{ 'Add' if is_state(scanner_mode_entity, 'Toevoegen')
           else ('Use' if is_state(scanner_mode_entity, 'Gebruiken') else '') }}
    actions:
      - condition: template
        value_template: "{{ scan_action in ['Add', 'Use'] }}"
      - service: pyscript.vh_inventory_scan_enqueue
        data:
          barcode: "{{ trigger.event.data.barcode }}"
          action: "{{ scan_action }}"
          device: "{{ trigger.event.data.device }}"

  - id: vh_inventory_print_shopping_switch
    alias: VH Inventory - Print Shopping List (scanner switch)
    description: >-
      When either scanner's "Print Shopping list" switch
      (switch.barcode_01_print_shopping_list / switch.barcode_02_print_shopping_list)
      is turned on, run the same action as the shopping-list Afdrukken button
      (script.vh_print_shopping), then turn both switches back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_print_shopping_list
          - switch.barcode_02_print_shopping_list
        to: "on"
    actions:
      - service: script.vh_print_shopping
      - service: switch.turn_off
        target:
          entity_id:
            - switch.barcode_01_print_shopping_list
            - switch.barcode_02_print_shopping_list

  - id: vh_inventory_print_inventory_switch
    alias: VH Inventory - Print Inventory List (scanner switch)
    description: >-
      When either scanner's "Print Inventory list" switch
      (switch.barcode_01_print_inventory_list / switch.barcode_02_print_inventory_list)
      is turned on, print the stock overview (script.vh_print_inventory), then
      turn both switches back off.
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - switch.barcode_01_print_inventory_list
          - switch.barcode_02_print_inventory_list
        to: "on"
    actions:
      - service: script.vh_print_inventory
      - service: switch.turn_off
        target:
          entity_id:
            - switch.barcode_01_print_inventory_list
            - switch.barcode_02_print_inventory_list

  - id: vh_inventory_announce
    alias: VH Inventory - TTS Announcement
    description: >-
      Decoupled TTS announcements for VH-Inventory. Listens for the
      vh_inventory_announce event fired by the pyscript backend and speaks a
      Dutch chime-tts message on the selected Sonos players. Runs in parallel
      and fully independently of the inventory logic, so slow/failed TTS can
      never affect core functionality. Handles the "added to the shopping list"
      (kind == shopping_add) and "scanned barcode could not be resolved"
      (kind == scan_unresolved) announcements, each gated by its own toggle.
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: state
        entity_id: input_boolean.vh_tts_enabled
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_tts_media_players') | trim) != '' }}"
      - condition: template
        value_template: >-
          {{ (trigger.event.data.kind == 'shopping_add'
                and is_state('input_boolean.vh_tts_announce_shopping_add', 'on'))
             or (trigger.event.data.kind == 'scan_unresolved'
                and is_state('input_boolean.vh_tts_announce_scan_unresolved', 'on')) }}
    variables:
      players: >-
        {{ states('input_text.vh_tts_media_players').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      volume: "{{ states('input_number.vh_tts_volume') | float(40) / 100 }}"
      product: "{{ trigger.event.data.product | default('') | trim }}"
      message: >-
        {% if trigger.event.data.kind == 'scan_unresolved' %}
        {% set t = states('input_text.vh_tts_msg_scan_unresolved') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'Onbekende streepjescode gescand. Handmatige invoer nodig.' %}
        {% endif %}
        {{ t }}
        {% else %}
        {% set t = states('input_text.vh_tts_msg_shopping_add') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de boodschappen lijst.' %}
        {% endif %}
        {{ t | replace('{product}', product) }}
        {% endif %}
    actions:
      - service: chime_tts.say
        target:
          entity_id: "{{ players }}"
        data:
          chime_path: bells
          offset: 450
          final_delay: 0
          tts_speed: 100
          tts_pitch: 0
          volume_level: "{{ volume }}"
          message: "{{ message | trim }}"
          tts_platform: cloud
          announce: true

  - id: vh_inventory_notify_mobile
    alias: VH Inventory - Mobile Notification
    description: >-
      Decoupled mobile push notifications for VH-Inventory. Listens for the
      same vh_inventory_announce event fired by the pyscript backend and sends
      a push notification to the selected mobile_app devices when a product is
      added to the shopping list (kind == shopping_add). Runs in parallel and
      fully independently of the inventory logic, so a slow/failed notification
      can never affect core functionality. The message text is configurable via
      input_text.vh_notify_msg_shopping_add (with a {product} placeholder).
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: template
        value_template: "{{ trigger.event.data.kind == 'shopping_add' }}"
      - condition: state
        entity_id: input_boolean.vh_notify_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.vh_notify_shopping_add
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_notify_devices') | trim) != '' }}"
    variables:
      devices: >-
        {{ states('input_text.vh_notify_devices').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      product: "{{ trigger.event.data.product | default('') | trim }}"
      message: >-
        {% set t = states('input_text.vh_notify_msg_shopping_add') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de boodschappen lijst.' %}
        {% endif %}
        {{ t | replace('{product}', product) }}
    actions:
      - repeat:
          for_each: "{{ devices }}"
          sequence:
            - service: "notify.{{ repeat.item }}"
              data:
                title: Boodschappenlijst
                message: "{{ message | trim }}"

  - id: vh_inventory_notify_scan_added
    alias: VH Inventory - Mobile Notification (Handheld Scan)
    description: >-
      Decoupled mobile push notification for handheld (MQTT) barcode scans.
      Listens for the vh_inventory_announce event with kind == scan_added,
      fired by the pyscript backend after a barcode published to
      'barcode/scanned' has been processed as an Add. Sends a push to the same
      selected mobile_app devices (input_text.vh_notify_devices). On a
      successful add the text comes from input_text.vh_notify_msg_scan_added
      (placeholders {product} and {qty}); when the barcode could not be resolved
      online (ok == false) the text comes from
      input_text.vh_notify_msg_scan_notfound (placeholder {barcode}). Runs in
      parallel and fully independently of the inventory logic, so a slow/failed
      notification can never affect core scan handling.
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: vh_inventory_announce
    conditions:
      - condition: template
        value_template: "{{ trigger.event.data.kind == 'scan_added' }}"
      - condition: state
        entity_id: input_boolean.vh_notify_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.vh_notify_scan_added
        state: "on"
      - condition: template
        value_template: "{{ (states('input_text.vh_notify_devices') | trim) != '' }}"
    variables:
      devices: >-
        {{ states('input_text.vh_notify_devices').split(',')
           | map('trim') | reject('eq', '')
           | reject('in', ['unknown', 'unavailable']) | list }}
      product: "{{ trigger.event.data.product | default('') | trim }}"
      qty: "{{ trigger.event.data.quantity | default(0) }}"
      barcode: "{{ trigger.event.data.barcode | default('') | trim }}"
      outcome: "{{ trigger.event.data.outcome | default('notfound') }}"
      message: >-
        {% if outcome == 'add' %}
        {% set t = states('input_text.vh_notify_msg_scan_added') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de voorraad.' %}
        {% endif %}
        {{ t | replace('{product}', product) | replace('{qty}', qty | string) }}
        {% elif outcome == 'use' %}
        {% set t = states('input_text.vh_notify_msg_scan_used') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} gebruikt. Voorraad: {qty}.' %}
        {% endif %}
        {{ t | replace('{product}', product) | replace('{qty}', qty | string) }}
        {% elif outcome == 'shopping' %}
        {% set t = states('input_text.vh_notify_msg_scan_shopping') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = '{product} toegevoegd aan de boodschappenlijst.' %}
        {% endif %}
        {{ t | replace('{product}', product) | replace('{qty}', qty | string) }}
        {% else %}
        {% set t = states('input_text.vh_notify_msg_scan_notfound') %}
        {% if t in ['', 'unknown', 'unavailable'] %}
        {% set t = 'Streepjescode {barcode} niet gevonden. Handmatige invoer nodig.' %}
        {% endif %}
        {{ t | replace('{barcode}', barcode) }}
        {% endif %}
    actions:
      - repeat:
          for_each: "{{ devices }}"
          sequence:
            - service: "notify.{{ repeat.item }}"
              data:
                title: Voorraad
                message: "{{ message | trim }}"

  - id: vh_inventory_mqtt_topic_changed
    alias: VH Inventory - Reload On MQTT Topic Change
    description: >-
      The handheld scanner's MQTT subscription (@mqtt_trigger in the pyscript app)
      binds its topic at load time. When the user edits input_text.vh_mqtt_topic on
      the Setup tab, reload the pyscript app so the trigger re-subscribes to the new
      topic. Ignores transient unknown/unavailable states so a restart does not
      trigger a spurious reload.
    mode: single
    triggers:
      - trigger: state
        entity_id: input_text.vh_mqtt_topic
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.to_state.state not in ['unknown', 'unavailable', '']
             and trigger.from_state is not none
             and trigger.from_state.state not in ['unknown', 'unavailable'] }}
    actions:
      - service: pyscript.reload

  - id: vh_inventory_seed_defaults
    alias: VH Inventory - Seed Setting Defaults
    description: >-
      On Home Assistant start, seed the TTS/notify setting helpers with sensible
      defaults ONLY when they are still uninitialised (state unknown/unavailable),
      e.g. on a fresh install or first boot after adding the package. These helpers
      deliberately have NO `initial:` so that user changes (selected speakers/devices,
      edited messages, volume) persist across restarts; without this an `initial:`
      would reset them on every restart. Values that are already set are left
      untouched (each set_value falls back to the current state).
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.vh_tts_volume
        data:
          value: >-
            {{ 40 if states('input_number.vh_tts_volume') in ['unknown', 'unavailable']
               else states('input_number.vh_tts_volume') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_media_players
        data:
          value: >-
            {{ '' if states('input_text.vh_tts_media_players') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_media_players') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_devices
        data:
          value: >-
            {{ '' if states('input_text.vh_notify_devices') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_devices') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_shopping_add
        data:
          value: >-
            {{ '{product} toegevoegd aan de boodschappen lijst.'
               if states('input_text.vh_tts_msg_shopping_add') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_msg_shopping_add') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_tts_msg_scan_unresolved
        data:
          value: >-
            {{ 'Onbekende streepjescode gescand. Handmatige invoer nodig.'
               if states('input_text.vh_tts_msg_scan_unresolved') in ['unknown', 'unavailable']
               else states('input_text.vh_tts_msg_scan_unresolved') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_shopping_add
        data:
          value: >-
            {{ '{product} toegevoegd aan de boodschappen lijst.'
               if states('input_text.vh_notify_msg_shopping_add') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_shopping_add') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_scan_added
        data:
          value: >-
            {{ '{product} toegevoegd aan de voorraad.'
               if states('input_text.vh_notify_msg_scan_added') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_scan_added') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_scan_notfound
        data:
          value: >-
            {{ 'Streepjescode {barcode} niet gevonden. Handmatige invoer nodig.'
               if states('input_text.vh_notify_msg_scan_notfound') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_scan_notfound') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_scan_used
        data:
          value: >-
            {{ '{product} gebruikt. Voorraad: {qty}.'
               if states('input_text.vh_notify_msg_scan_used') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_scan_used') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_notify_msg_scan_shopping
        data:
          value: >-
            {{ '{product} toegevoegd aan de boodschappenlijst.'
               if states('input_text.vh_notify_msg_scan_shopping') in ['unknown', 'unavailable']
               else states('input_text.vh_notify_msg_scan_shopping') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.vh_mqtt_topic
        data:
          value: >-
            {{ 'barcode/scanned'
               if states('input_text.vh_mqtt_topic') in ['unknown', 'unavailable', '']
               else states('input_text.vh_mqtt_topic') }}